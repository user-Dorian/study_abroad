    <style id="component-vars">

        </div>

      </div>
    </div>

    </main>
    <script>
(function(){
  var token = localStorage.getItem('rag-auth-token');
  if (!token) { window.location.replace('/login.html'); return; }

  const API_BASE = window.location.origin;

  async function apiRequest(url, options) {
    options = options || {};
    var headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    try {
      var resp = await fetch(API_BASE + url, { ...options, headers: headers });
      if (resp.status === 401) {
        localStorage.removeItem('rag-auth-token');
        window.location.replace('/login.html');
        return null;
      }
      if (!resp.ok) {
        var data = await resp.json().catch(function(){ return {}; });
        throw new Error((data && data.detail) || '请求失败');
      }
      return resp.json();
    } catch (e) {
      if (e.message && e.message.includes('Failed to fetch')) {
        console.warn('API不可达:', url);
        return null;
      }
      throw e;
    }
  }

  // ===== 自定义确认弹窗 =====
  function showConfirm(msg) {
    return new Promise(function(resolve) {
      var existing = document.getElementById('custom-confirm-overlay');
      if (existing) existing.remove();

      var overlay = document.createElement('div');
      overlay.id = 'custom-confirm-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center';

      var box = document.createElement('div');
      box.style.cssText = 'background:var(--card);border-radius:12px;padding:24px;min-width:300px;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.15);text-align:center';

      box.innerHTML = '<div style="margin-bottom:12px"><i data-lucide="alert-triangle" style="width:28px;height:28px;color:var(--destructive)"></i></div>' +
        '<p class="text-sm" style="color:var(--foreground);margin-bottom:20px;line-height:1.5">' + msg + '</p>' +
        '<div class="flex gap-2 justify-center">' +
        '<button id="confirm-cancel-btn" class="px-4 py-2 rounded-lg text-sm cursor-pointer" style="background:var(--muted);color:var(--foreground);border:none;min-width:80px">取消</button>' +
        '<button id="confirm-ok-btn" class="px-4 py-2 rounded-lg text-sm cursor-pointer" style="background:var(--destructive);color:#fff;border:none;min-width:80px">确认删除</button>' +
        '</div>';

      overlay.appendChild(box);
      document.body.appendChild(overlay);
      try { lucide.createIcons(); } catch(e) {}

      document.getElementById('confirm-cancel-btn').addEventListener('click', function() {
        overlay.remove();
        resolve(false);
      });
      document.getElementById('confirm-ok-btn').addEventListener('click', function() {
        overlay.remove();
        resolve(true);
      });
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          overlay.remove();
          resolve(false);
        }
      });
    });
  }

  var currentConversationId = null;
  var conversations = [];

  function loadProfile() {
    apiRequest('/api/profile/me').then(function(data){
      if (!data) return;
      var profile = data.profile || data.data || data;
      if (profile.name) {
        document.getElementById('nav-name').textContent = profile.name;
        document.getElementById('nav-avatar').textContent = profile.name.charAt(0);
      }
    }).catch(function(err){
      console.warn('加载个人资料失败:', err);
    });
  }

  document.getElementById('nav-clients').addEventListener('click', function(){
    window.location.href = 'clients.html';
  });
  document.getElementById('nav-dispatch').addEventListener('click', function(){
    window.location.href = 'dispatch.html';
  });
  document.getElementById('nav-profile').addEventListener('click', function(){
    window.location.href = 'profile.html';
  });
  document.getElementById('new-chat-btn').addEventListener('click', function(){
    currentConversationId = null;
    document.getElementById('chat-title').textContent = '新对话';
    document.getElementById('chat-status').style.display = 'none';
    document.getElementById('mini-client-card').style.display = 'none';
    document.getElementById('pipeline-bar').style.display = 'none';
    document.getElementById('message-area').innerHTML = '<div class="flex items-center justify-center h-full" style="color: var(--muted-foreground);"><p class="text-sm">开始新的对话，输入消息即可发送</p></div>';
    document.getElementById('msg-input').value = '';
    document.getElementById('msg-input').focus();
  });

  function loadConversations() {
    apiRequest('/api/consultant/contact-conversations').then(function(data){
      if (!data) return;
      var list = data.conversations || data.data || data || [];
      conversations = list;
      renderConversationList(list);
    }).catch(function(err){
      console.warn('加载对话列表失败:', err);
    });
  }

  function renderConversationList(list) {
    var container = document.getElementById('conversation-list');
    if (!list || list.length === 0) {
      container.innerHTML = '<div class="p-4 text-xs text-center" style="color:var(--muted-foreground);">暂无对话</div>';
      return;
    }
    var html = '<div class="flex flex-col gap-0.5">';
    list.forEach(function(conv){
      var name = conv.client_name || conv.name || '未知';
      var initial = name.charAt(0);
      var lastMsg = conv.last_message || conv.latest_message || '';
      var time = conv.updated_at || conv.last_time || '';
      var isActive = currentConversationId === conv.id;
      var bgStyle = isActive ? 'background: var(--background); border-left: 3px solid var(--primary);' : '';
      var colorStyle = isActive ? '' : 'style="color: var(--sidebar-foreground);"';
      html += '<div class="conv-item flex items-center gap-2.5 w-full px-3 py-2.5 rounded-lg text-left cursor-pointer" data-id="' + conv.id + '" style="' + bgStyle + ' transition: background 0.1s; position:relative;" ' + colorStyle + '>' +
        '<span class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-semibold shrink-0" style="background: var(--primary); color: var(--primary-foreground);">' + initial + '</span>' +
        '<div class="flex-1 min-w-0">' +
        '<span class="text-sm font-medium truncate block">' + name + '</span>' +
        '<p class="text-xs truncate mt-0.5" style="color: var(--muted-foreground);">' + (lastMsg || '') + '</p>' +
        '</div>' +
        '<span class="text-xs shrink-0 whitespace-nowrap" style="color: var(--muted-foreground);">' + time + '</span>' +
        '<span class="conv-del-btn" style="display:none;position:absolute;right:4px;top:4px;width:18px;height:18px;border-radius:4px;text-align:center;line-height:18px;font-size:10px;cursor:pointer;background:var(--destructive);color:#fff;font-weight:bold">&times;</span>' +
        '</div>';
    });
    html += '</div>';
    container.innerHTML = html;

    container.querySelectorAll('.conv-item').forEach(function(el){
      el.addEventListener('mouseenter', function(){ var db = el.querySelector('.conv-del-btn'); if(db) db.style.display = 'block'; });
      el.addEventListener('mouseleave', function(){ var db = el.querySelector('.conv-del-btn'); if(db) db.style.display = 'none'; });
      el.addEventListener('click', function(e){
        if (e.target.classList.contains('conv-del-btn')) return;
        var id = el.getAttribute('data-id');
        selectConversation(id);
      });
      var delBtn = el.querySelector('.conv-del-btn');
      if (delBtn) {
        delBtn.addEventListener('click', async function(e) {
          e.stopPropagation();
          var id = el.getAttribute('data-id');
          var ok = await showConfirm('确定删除此对话？');
          if (!ok) return;
          apiRequest('/api/conversations/' + id, { method: 'DELETE' }).then(function() {
            if (currentConversationId === id) {
              currentConversationId = null;
              document.getElementById('chat-title').textContent = '新对话';
              document.getElementById('message-area').innerHTML = '<div class="flex items-center justify-center h-full" style="color: var(--muted-foreground);"><p class="text-sm">开始新的对话</p></div>';
            }
            loadConversations();
          }).catch(function(err){ console.warn('删除对话失败:', err); });
        });
      }
    });
  }

  function selectConversation(id) {
    currentConversationId = id;
    var conv = conversations.find(function(c){ return c.id == id; });
    if (conv) {
      var name = conv.client_name || conv.name || '未知';
      document.getElementById('chat-title').textContent = name;
      document.getElementById('chat-status').style.display = '';
    }
    renderConversationList(conversations);
    loadMessages(id);
  }

  function loadMessages(convId) {
    var area = document.getElementById('message-area');
    area.innerHTML = '<div class="flex items-center justify-center h-full" style="color: var(--muted-foreground);"><p class="text-sm">加载中...</p></div>';

    apiRequest('/api/consultant/conversations/' + convId + '/messages').then(function(data){
      var msgs = data.messages || data.data || data || [];
      renderMessages(msgs);
    }).catch(function(err){
      area.innerHTML = '<div class="flex items-center justify-center h-full" style="color: var(--muted-foreground);"><p class="text-sm">加载失败</p></div>';
      console.warn('加载消息失败:', err);
    });
  }

  function renderMessages(msgs) {
    var area = document.getElementById('message-area');
    if (!msgs || msgs.length === 0) {
      area.innerHTML = '<div class="flex items-center justify-center h-full" style="color: var(--muted-foreground);"><p class="text-sm">暂无消息</p></div>';
      return;
    }
    var html = '<div class="flex flex-col gap-4" style="max-width: 780px;">';
    msgs.forEach(function(msg){
      var isStudent = msg.role === 'user' || msg.role === 'student';
      var isAI = msg.role === 'assistant' || msg.role === 'ai';
      var isConsultant = msg.role === 'consultant' || msg.role === 'staff';
      var senderName = msg.sender_name || (isStudent ? '学生' : (isAI ? 'AI助手' : '我'));
      var content = msg.content || '';
      var time = msg.created_at || msg.timestamp || '';

      if (isStudent) {
        html += '<div class="flex items-start gap-3">' +
          '<span class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold shrink-0" style="background: var(--muted); color: var(--foreground);">' + senderName.charAt(0) + '</span>' +
          '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center gap-2 mb-1"><span class="text-xs font-semibold" style="color: var(--foreground);">' + senderName + '</span><span class="text-xs" style="color: var(--muted-foreground);">' + time + '</span></div>' +
          '<div class="inline-flex px-4 py-2.5 rounded-2xl rounded-tl text-sm" style="background: var(--muted); color: var(--foreground); max-width: 600px;">' + content + '</div>' +
          '</div></div>';
      } else if (isAI) {
        html += '<div class="flex items-start gap-3">' +
          '<span class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: var(--primary); color: var(--primary-foreground);">' +
          '<svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;"><use href="#i-bot"/></svg></span>' +
          '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center gap-2 mb-1"><span class="text-xs font-semibold" style="color: var(--foreground);">AI助手</span><span class="text-xs" style="color: var(--muted-foreground);">' + time + '</span></div>' +
          '<div class="px-4 py-3 rounded-2xl rounded-tl text-sm" style="background: var(--card); border: 1px solid var(--border); color: var(--foreground); max-width: 600px;">' + content + '</div>' +
          '</div></div>';
      } else {
        html += '<div class="flex items-start gap-3">' +
          '<span class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold shrink-0" style="background: var(--chart-1); color: var(--primary-foreground);">' + senderName.charAt(0) + '</span>' +
          '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center gap-2 mb-1"><span class="text-xs font-semibold" style="color: var(--foreground);">' + senderName + '</span><span class="text-xs" style="color: var(--muted-foreground);">' + time + '</span></div>' +
          '<div class="inline-flex px-4 py-2.5 rounded-2xl rounded-tl text-sm" style="background: color-mix(in srgb, var(--primary) 12%, var(--accent)); color: var(--foreground); max-width: 600px;">' + content + '</div>' +
          '</div></div>';
      }
    });
    html += '</div>';
    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  document.getElementById('send-btn').addEventListener('click', function(){
    sendCurrentMessage();
  });
  document.getElementById('msg-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendCurrentMessage();
    }
  });

  function sendCurrentMessage() {
    var input = document.getElementById('msg-input');
    var content = input.value.trim();
    if (!content || !currentConversationId) return;
    input.value = '';
    apiRequest('/api/consultant/conversations/' + currentConversationId + '/messages', {
      method: 'POST',
      body: JSON.stringify({ content: content, role: 'consultant' })
    }).then(function(data){
      loadMessages(currentConversationId);
      loadConversations();
    }).catch(function(err){
      console.warn('发送消息失败:', err);
    });
  }

  function loadWorkspaceStats() {
    apiRequest('/api/consultant/workspace/stats').then(function(data){
      if (!data) return;
      var stats = data.stats || data.data || data;
      if (stats.monthly_consult !== undefined) {
        document.getElementById('stat-monthly-consult').textContent = stats.monthly_consult;
        document.getElementById('stat-consult-trend').textContent = stats.consult_trend || '-';
      }
      if (stats.bound_clients !== undefined) {
        document.getElementById('stat-bound-clients').textContent = stats.bound_clients;
        document.getElementById('stat-client-trend').textContent = stats.client_trend || '-';
      }
      if (stats.satisfaction !== undefined) {
        document.getElementById('stat-satisfaction').textContent = stats.satisfaction;
        document.getElementById('stat-sat-trend').textContent = stats.sat_trend || '-';
      }
      if (stats.quota_used !== undefined) {
        document.getElementById('stat-quota-used').textContent = stats.quota_used;
        var total = stats.quota_total || 50;
        document.getElementById('stat-quota-total').textContent = '/ ' + total + ' 次';
        document.getElementById('quota-bar').style.width = Math.min(100, (stats.quota_used / total) * 100) + '%';
        document.getElementById('quota-display').textContent = stats.quota_used + '/' + total + ' 本月已用';
      }
    }).catch(function(err){
      console.warn('加载工作台统计失败:', err);
    });
  }

  function loadTodos() {
    apiRequest('/api/consultant/todos').then(function(data){
      if (!data) return;
      var todos = data.todos || data.data || data || [];
      var container = document.getElementById('todo-list');
      var countEl = document.getElementById('todo-count');
      countEl.textContent = todos.length;
      if (!todos || todos.length === 0) {
        container.innerHTML = '<div class="px-2.5 py-2 text-xs" style="color: var(--muted-foreground);">暂无待办</div>';
        return;
      }
      var html = '';
      todos.forEach(function(todo){
        var color = todo.priority === 'high' ? 'var(--destructive)' : 'var(--chart-1)';
        html += '<div class="flex items-center gap-2 px-2.5 py-2 rounded-lg cursor-pointer" style="background: color-mix(in srgb, var(--primary) 8%, transparent);">' +
          '<span class="w-1.5 h-1.5 rounded-full shrink-0" style="background: ' + color + ';"></span>' +
          '<span class="text-xs truncate" style="color: var(--foreground);">' + (todo.title || todo.content || '') + '</span></div>';
      });
      container.innerHTML = html;
    }).catch(function(err){
      console.warn('加载待办失败:', err);
    });
  }

  document.getElementById('composer-binding-request').addEventListener('click', function(){
    var userId = prompt('请输入要绑定的用户ID：');
    if (!userId) return;
    var message = prompt('请输入绑定请求附言（可选）：') || '';
    apiRequest('/api/consultant/binding-requests', {
      method: 'POST',
      body: JSON.stringify({ user_id: userId, message: message })
    }).then(function(){
      alert('绑定请求已发送');
    }).catch(function(err){
      alert('发送绑定请求失败: ' + err.message);
    });
  });

  var dashboardVisible = true;
  document.getElementById('toggle-dashboard').addEventListener('click', function(){
    dashboardVisible = !dashboardVisible;
    var panel = document.getElementById('dashboard-panel');
    var chevron = document.getElementById('dashboard-chevron');
    panel.style.display = dashboardVisible ? '' : 'none';
    chevron.style.transform = dashboardVisible ? '' : 'rotate(180deg)';
  });

  loadConversations();
  loadWorkspaceStats();
  loadTodos();
  loadProfile();
  if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
})();
    </script>

    <script>
        // 注册Service Worker（修正路径）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                // 尝试多个可能的路径
                const swPaths = ['/frontend/sw.js', '/sw.js', './sw.js'];
                let registered = false;

                swPaths.forEach(function(path) {
                    if (!registered) {
                        navigator.serviceWorker.register(path)
                            .then(function(registration) {
                                registered = true;
                                console.log('[SW] 注册成功，路径:', path, '作用域:', registration.scope);
                            })
                            .catch(function(error) {
                                console.log('[SW] 路径注册失败:', path, error.message);
                            });
                    }
                });
            });
        }
    </script>
</body>
