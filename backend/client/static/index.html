const API_BASE = window.location.origin;

async function apiRequest(url, options = {}) {
    const token = localStorage.getItem('rag-auth-token');
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const resp = await fetch(API_BASE + url, { ...options, headers });
    if (resp.status === 401) { localStorage.removeItem('rag-auth-token'); window.location.replace('/login.html'); return null; }
    if (!resp.ok) { const data = await resp.json().catch(() => {}); throw new Error(data?.detail || '请求失败'); }
    return resp.json();
}

function showToast(msg, type) {

    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.12);transition:opacity 0.3s;max-width:80vw;text-align:center';

    setTimeout(function() { toast.style.opacity = '0'; setTimeout(function() { toast.remove(); }, 300); }, 3000);
}

// ===== 手机号强制绑定对话框功能 =====
(function initPhoneBindingCheck() {
    var token = localStorage.getItem('rag-auth-token');
    if (!token) {
        // 未登录，跳转到登录页
        window.location.replace('/login.html');
        return;
    }

    // 创建绑定对话框的HTML结构
    function createPhoneBindDialog() {
        // 创建遮罩层
        var overlay = document.createElement('div');
        overlay.className = 'phone-bind-overlay';
        overlay.id = 'phone-bind-overlay';

        // 创建对话框主体
        var modal = document.createElement('div');
        modal.className = 'phone-bind-modal';

        // 构建对话框内容
        modal.innerHTML =
            '<h2 class="phone-bind-title">绑定手机号</h2>' +
            '<p class="phone-bind-desc">为了更好地为您提供服务，请绑定您的手机号</p>' +
            '<div class="phone-input-container">' +
                '<input type="text" class="phone-input" id="phone-input" placeholder="请输入11位手机号" maxlength="11" autocomplete="off">' +
            '</div>' +
            '<div class="phone-error-text" id="phone-error-text"></div>' +
            '<div class="phone-btn-container">' +
                '<button class="phone-bind-btn secondary" id="phone-cancel-btn">取消</button>' +
                '<button class="phone-bind-btn primary" id="phone-confirm-btn" disabled>确认绑定</button>' +
            '</div>' +
            '<div class="phone-bind-notice">' +
                '温馨提示：绑定手机号后才能使用系统功能。取消后将无法进入系统。' +
            '</div>';

        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        // 禁用页面主体内容
        document.body.style.overflow = 'hidden';
        var mainContent = document.querySelector('main');
        if (mainContent) {
            mainContent.style.pointerEvents = 'none';
            mainContent.style.opacity = '0.3';
        }

        return overlay;
    }

    // 验证手机号格式（中国大陆手机号）
    function validatePhoneNumber(phone) {
        var phoneRegex = /^1[3-9]\d{9}$/;
        return phoneRegex.test(phone);
    }

    // 绑定手机号
    async function bindPhoneNumber(phone) {
        try {
            var response = await fetch(API_BASE + '/api/auth/bind-phone', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ phone: phone })
            });

            var data = await response.json();

            if (response.ok) {
                // 绑定成功
                return { success: true, message: '绑定成功' };
            } else {
                // 绑定失败
                return {
                    success: false,
                    message: data.detail || data.message || '绑定失败，请重试'
                };
            }
        } catch (error) {
            return {
                success: false,
                message: '网络错误，请检查网络连接后重试'
            };
        }
    }

    // 显示绑定对话框并处理交互
    async function showPhoneBindDialog() {
        var overlay = createPhoneBindDialog();
        var phoneInput = document.getElementById('phone-input');
        var errorText = document.getElementById('phone-error-text');
        var confirmBtn = document.getElementById('phone-confirm-btn');
        var cancelBtn = document.getElementById('phone-cancel-btn');

        // 输入框实时验证
        phoneInput.addEventListener('input', function(e) {
            var value = e.target.value;

            // 只允许输入数字
            value = value.replace(/\D/g, '');
            e.target.value = value;

            // 实时验证
            if (value.length === 0) {
                errorText.textContent = '';
                phoneInput.classList.remove('error');
                confirmBtn.disabled = true;
            } else if (value.length < 11) {
                errorText.textContent = '请输入完整的11位手机号';
                phoneInput.classList.remove('error');
                confirmBtn.disabled = true;
            } else if (!validatePhoneNumber(value)) {
                errorText.textContent = '手机号格式不正确，请检查后重新输入';
                phoneInput.classList.add('error');
                confirmBtn.disabled = true;
            } else {
                errorText.textContent = '';
                phoneInput.classList.remove('error');
                confirmBtn.disabled = false;
            }
        });

        // 取消按钮：退出登录并跳转到登录页
        cancelBtn.addEventListener('click', function() {
            localStorage.removeItem('rag-auth-token');
            localStorage.removeItem('rag-auth-user');
            window.location.replace('/login.html');
        });

        // 确认绑定按钮
        confirmBtn.addEventListener('click', async function() {
            var phone = phoneInput.value.trim();

            if (!validatePhoneNumber(phone)) {
                errorText.textContent = '手机号格式不正确，请检查后重新输入';
                phoneInput.classList.add('error');
                return;
            }

            // 禁用按钮，显示加载状态
            confirmBtn.disabled = true;
            confirmBtn.textContent = '绑定中...';
            errorText.textContent = '';

            // 调用绑定接口
            var result = await bindPhoneNumber(phone);

            if (result.success) {
                // 绑定成功，关闭对话框，恢复页面
                overlay.remove();
                document.body.style.overflow = '';
                var mainContent = document.querySelector('main');
                if (mainContent) {
                    mainContent.style.pointerEvents = '';
                    mainContent.style.opacity = '';
                }
                // 显示成功提示
                if (typeof showToast === 'function') {
                    showToast('手机号绑定成功', 'success');
                }
            } else {
                // 绑定失败，显示错误信息
                errorText.textContent = result.message;
                phoneInput.classList.add('error');
                confirmBtn.disabled = false;
                confirmBtn.textContent = '确认绑定';
            }
        });

        // 阻止遮罩层点击关闭（强制绑定）
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                // 点击遮罩层不关闭对话框（强制绑定）
                // 可以添加一个视觉反馈
                modal.style.animation = 'none';
                modal.offsetHeight; // 触发重排
                modal.style.animation = 'slideUp 0.3s ease';
            }
        });

        // 自动聚焦输入框
        phoneInput.focus();
    }

    // 检查绑定状态
    async function checkPhoneBinding() {
        try {
            var response = await fetch(API_BASE + '/api/auth/check-phone-binding', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            if (response.ok) {
                var data = await response.json();

                // 检查是否已绑定
                // 响应格式可能是: { bound: true/false } 或 { has_phone: true/false }
                var isBound = data.bound === true || data.has_phone === true || data.phone_bound === true;

                if (!isBound) {
                    // 未绑定，显示绑定对话框
                    showPhoneBindDialog();
                }
                // 已绑定则正常进入系统（不需要做任何操作）
            } else if (response.status === 401) {
                // token无效，跳转到登录页
                localStorage.removeItem('rag-auth-token');
                localStorage.removeItem('rag-auth-user');
                window.location.replace('/login.html');
            } else {
                // 其他错误，静默失败，允许用户进入系统
                console.warn('检查手机号绑定状态失败，状态码:', response.status);
            }
        } catch (error) {
            // 网络错误或其他异常，静默失败，允许用户进入系统
            console.error('检查手机号绑定状态时发生错误:', error);
        }
    }

    // 页面加载时检查绑定状态
    // 延迟500ms执行，确保页面主要内容已渲染
    setTimeout(function() {
        checkPhoneBinding();
    }, 500);
})();

    (function initLeftSidebar() {

        // 应用状态
        function applyState(width, minimized) {
            if (minimized) {
                sidebar.classList.add('minimized');
                sidebar.style.width = MINIMIZED_WIDTH + 'px';
                if (toggleBtn) { toggleBtn.textContent = '›'; toggleBtn.title = '展开导航栏'; }

        sidebar.classList.add('dragging');
        var savedWidth = parseInt(localStorage.getItem('left_sidebar_width')) || DEFAULT_WIDTH;
        var savedMin = localStorage.getItem('left_sidebar_minimized') === 'true';
        applyState(savedWidth, savedMin);
        requestAnimationFrame(function() { sidebar.classList.remove('dragging'); });

        // 最小化/展开按钮
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function() {
                var isMin = sidebar.classList.contains('minimized');
                var newMin = !isMin;
                var w = parseInt(localStorage.getItem('left_sidebar_width')) || DEFAULT_WIDTH;
                applyState(w, newMin);
                localStorage.setItem('left_sidebar_minimized', String(newMin));
            });
        }

        // 拖动调整宽度
        var isDragging = false;
        var startX = 0;
        var startWidth = 0;

        resizer.addEventListener('mousedown', function(e) {
            e.preventDefault();
            isDragging = true;
            startX = e.clientX;
            startWidth = sidebar.offsetWidth;
            sidebar.classList.add('dragging');  // 关键：禁用transition
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            var delta = e.clientX - startX;
            var newWidth = startWidth + delta;
            if (newWidth < MIN_WIDTH) newWidth = MIN_WIDTH;
            if (newWidth > MAX_WIDTH) newWidth = MAX_WIDTH;
            sidebar.style.width = newWidth + 'px';
        });

        document.addEventListener('mouseup', function() {
            if (!isDragging) return;
            isDragging = false;
            sidebar.classList.remove('dragging');  // 恢复transition
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            var finalWidth = sidebar.offsetWidth;
            if (!sidebar.classList.contains('minimized')) {
                localStorage.setItem('left_sidebar_width', String(finalWidth));

        });

        document.addEventListener('mouseup', function() {

                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
    }

    if (toggleBtn) {

    // ===== 自定义确认弹窗 =====
    function showConfirm(msg) {

            if (existing) existing.remove();

            var overlay = document.createElement('div');
            overlay.id = 'custom-confirm-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center';

            var box = document.createElement('div');

                '<p class="text-sm" style="color:var(--foreground);margin-bottom:20px;line-height:1.5">' + msg + '</p>' +
                '<div class="flex gap-2 justify-center">' +
                '<button id="confirm-cancel-btn" class="px-4 py-2 rounded-lg text-sm cursor-pointer" style="background:var(--muted);color:var(--foreground);border:none;min-width:80px">取消</button>' +
                '<button id="confirm-ok-btn" class="px-4 py-2 rounded-lg text-sm cursor-pointer" style="background:var(--destructive);color:#fff;border:none;min-width:80px">确认删除</button>' +
                '</div>';

            document.getElementById('confirm-cancel-btn').addEventListener('click', function() {

            batchBar.style.display = 'none';
        }
        loadConversations();

    // ===== 更新批量计数 =====
    function updateBatchCount() {
        var keys = Object.keys(selectedConvIds);
        var n = keys.length;
        batchCount.textContent = '已选 ' + n + ' 项';
        if (isBatchMode && n > 0) {
            batchBar.style.display = 'flex';

    // ===== 批量删除 =====
    async function batchDeleteConversations() {
        var ids = Object.keys(selectedConvIds);
        if (ids.length === 0) { showToast('请选择要删除的对话', 'error'); return; }

        var ok = await showConfirm('确定删除选中的 ' + ids.length + ' 个对话？此操作不可恢复。');
        if (!ok) return;

        var successCount = 0;
        for (var i = 0; i < ids.length; i++) {
            try {
                await apiRequest('/api/conversations/' + ids[i], { method: 'DELETE' });
                if (currentConversationId === ids[i]) {
                    currentConversationId = null;
                    chatTitle.textContent = '留学智能助手';
                }
                successCount++;
            } catch(e) {}
        }

        isBatchMode = false;
        selectedConvIds = {};
        batchBar.style.display = 'none';
        loadConversations();
        if (selectedConvIds !== null) showEmpty();
        showToast('已删除 ' + successCount + ' 个对话');
    }

                    chk.addEventListener('change', function() {

                        } else {

                        '<span class="conv-del" style="display:none;flex-shrink:0;width:20px;height:20px;border-radius:4px;text-align:center;line-height:20px;font-size:11px;cursor:pointer;background:var(--destructive);color:#fff;font-weight:bold">&times;</span>';

                            apiRequest('/api/conversations/' + convId + '/title', {

                    item.addEventListener('click', function(e) {

                        document.querySelectorAll('.conv-item').forEach(function(c) { c.style.background = 'transparent'; c.dataset.active = 'false'; var db = c.querySelector('.conv-del'); if(db) db.style.display = 'none'; });

    async function switchConversation(convId, title) {
        currentConversationId = convId;
        chatTitle.textContent = title || '对话';
        // 切换对话时重置用户滚动状态（需求4）
        userScrolledUp = false;
        clearThinkingTimer();
        showLoading();
        try {
            var data = await apiRequest('/api/conversations/' + convId + '/messages');
            var messages = data.messages || data || [];
            userScrolledUp = false;  // 内层重置（避免 innerHTML 清空触发 scroll 误判）
            messagesContainer.innerHTML = '';
            if (messages.length === 0) {
                showEmpty();
                return;
            }
            messages.forEach(function(msg) {
                var role = msg.role || 'user';
                var content = msg.content || '';
                appendMessage(role, content);
            });
            // 等DOM渲染完成后再滚动到底部（需求4）
            setTimeout(function() {
                userScrolledUp = false;
                if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 0);
        } catch(e) {
            showEmpty();
            showToast('加载消息失败', 'error');
        }
    }

    async function newConversation() {
        // 检查是否已有空对话（仅按 message_count 判断，不看标题）
        for (var i = 0; i < allConversations.length; i++) {
            var c = allConversations[i];
            var msgCount = c.message_count || 0;
            // 空会话定义：消息数为0（无任何互动）
            if (msgCount === 0) {
                currentConversationId = c.id || c.conversation_id;
                chatTitle.textContent = c.title || '新对话';
                // 切换到已有空对话时，加载其历史消息（可能包含AI问候）
                switchConversation(currentConversationId, c.title || '新对话');
                return;
            }
        }
        // 没有空对话，调用问候端点创建新会话+AI问候
        try {
            var resp = await apiRequest('/api/conversations/greeting', { method: 'POST' });
            if (resp && resp.conversation_id) {
                currentConversationId = resp.conversation_id;
                chatTitle.textContent = '新对话';
                // 清空消息区
                messagesContainer.innerHTML = '';
                // 只有当 greeting_message 非空时才渲染
                if (resp.greeting_message && resp.greeting_message.trim()) {
                    appendMessage('assistant', resp.greeting_message);
                }
                // 刷新会话列表和右侧profile面板
                loadConversations();
                loadStudentProfile();
            }
        } catch(e) {
            showToast('创建对话失败: ' + (e.message || ''), 'error');
        }
    }

    var allConversations = [];

    async function sendMessage() {
        var text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        // 需求6：发送后重置输入框高度为1行（24px）
        if (typeof autoResize === 'function') autoResize();

        var existingEmpty = messagesContainer.querySelector('.flex.items-center.justify-center.h-full');
        if (existingEmpty) messagesContainer.innerHTML = '';

        appendMessage('user', text);

        if (!currentConversationId) {
            if (allConversations.length > 0) {
                var first = allConversations[0];
                currentConversationId = first.id || first.conversation_id;
                chatTitle.textContent = first.title || '对话';
            } else {
                try {
                    var conv = await apiRequest('/api/conversations', { method: 'POST', body: JSON.stringify({ title: text.substring(0, 30) }) });
                    if (conv) {
                        currentConversationId = conv.id || conv.conversation_id;
                        chatTitle.textContent = text.substring(0, 30) + '...';
                        loadConversations();
                    }
                } catch (e) {
                    showToast('创建对话失败', 'error');
                    return;
                }
            }
        }

        if (!currentConversationId) return;

        var aiMsgWrapper = getOrCreateStreamingMsg();
        var aiContentEl = aiMsgWrapper.querySelector('.ai-flow-content');
        var aiFlowStatusEl = aiMsgWrapper.querySelector('.ai-flow-status');
        var aiFlowTextEl = aiMsgWrapper.querySelector('.ai-flow-text');
        var fullContent = '';
        var hasAnswerStarted = false;

        // 跳过过快的节点（加载历史、查询改写）
        var skipSteps = [0, 1];

        // 启动思考状态超时兜底（需求3）：18秒无响应则切换兜底文案
        startThinkingTimer(aiFlowTextEl);

        try {
            var resp = await fetch(API_BASE + '/api/conversations/' + currentConversationId + '/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('rag-auth-token') },
                body: JSON.stringify({ question: text })
            });
            if (resp.status === 401) { localStorage.removeItem('rag-auth-token'); window.location.replace('/login.html'); clearThinkingTimer(); return; }
            if (!resp.ok) { throw new Error('请求失败'); }

            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';

            while (true) {
                var readResult = await reader.read();
                if (readResult.done) break;
                buffer += decoder.decode(readResult.value, { stream: true });
                var parts = buffer.split('\n');
                buffer = parts.pop() || '';
                for (var p = 0; p < parts.length; p++) {
                    var line = parts[p].trim();
                    if (line.startsWith('data: ')) {
                        var dataStr = line.substring(6).trim();
                        if (dataStr === '[DONE]') continue;
                        try {
                            var parsed = JSON.parse(dataStr);
                            if (parsed.step !== undefined && parsed.name) {
                                // 只展示当前实时节点（跳过过快的节点）
                                if (!hasAnswerStarted && skipSteps.indexOf(parsed.step) < 0) {
                                    if (parsed.status === 'running') {
                                        // 需求1：技术节点名映射为用户友好文案，淡入淡出过渡
                                        if (aiFlowTextEl) setFlowText(aiFlowTextEl, mapStepToUserText(parsed.name));
                                    }
                                    // success/miss/skip 状态：静默过渡，不停留
                                }
                            } else if (parsed.type === 'answer_chunk' && parsed.content) {
                                if (!hasAnswerStarted) {
                                    hasAnswerStarted = true;
                                    if (aiFlowStatusEl) aiFlowStatusEl.style.display = 'none';
                                    if (aiContentEl) aiContentEl.style.display = 'block';
                                    // 第一个 chunk 到达，清除思考超时计时器（需求3）
                                    clearThinkingTimer();
                                }
                                fullContent += parsed.content;
                                // 流式期间用 textContent 累加，避免中间态 HTML 注入和抖动（需求5）
                                appendStreamChunk(aiContentEl, parsed.content);
                            } else if (parsed.type === 'result' && parsed.answer) {
                                if (!hasAnswerStarted) {
                                    hasAnswerStarted = true;
                                    if (aiFlowStatusEl) aiFlowStatusEl.style.display = 'none';
                                    if (aiContentEl) aiContentEl.style.display = 'block';
                                    clearThinkingTimer();
                                }
                                fullContent = parsed.answer;
                                // result 通常是完整结果，一次性渲染 markdown（需求5）
                                finalizeStreamMsg(aiContentEl, fullContent);
                            } else if (parsed.type === 'answer_done') {
                                // answer_done 仅作为完成信号，不追加任何内容到对话
                                if (!hasAnswerStarted) {
                                    hasAnswerStarted = true;
                                    if (aiFlowStatusEl) aiFlowStatusEl.style.display = 'none';
                                    if (aiContentEl) aiContentEl.style.display = 'block';
                                    clearThinkingTimer();
                                }
                                // 如果有内容则渲染，没有则跳过
                                if (fullContent) {
                                    finalizeStreamMsg(aiContentEl, fullContent);
                                }
                            } else if (parsed.type === 'student_field_updated') {
                                updateInfoFieldFromSSE(parsed.field, parsed.value, parsed.completion_rate);
                            } else if (parsed.type === 'notes_updated') {
                                // P0修复(HIGH-2)：监听notes支路SSE事件，实时刷新右侧面板
                                // loadStudentProfile会重新拉取完整profile（含最新notes字段）
                                loadStudentProfile();
                                if (typeof showToast === 'function') {
                                    var kw = (parsed.keywords && parsed.keywords.length)
                                        ? '（关键词：' + parsed.keywords.join('、') + '）'
                                        : '';
                                    showToast('已记录您的特殊需求' + kw, 'success');
                                }
                            } else if (parsed.type === 'notes_error') {
                                // 备注支路异常静默处理，不打扰用户
                                if (window.console) console.warn('[notes_error]', parsed.detail);
                            } else if (!parsed.type && parsed.content) {
                                if (!hasAnswerStarted) {
                                    hasAnswerStarted = true;
                                    if (aiFlowStatusEl) aiFlowStatusEl.style.display = 'none';
                                    if (aiContentEl) aiContentEl.style.display = 'block';
                                    clearThinkingTimer();
                                }
                                fullContent += parsed.content;
                                appendStreamChunk(aiContentEl, parsed.content);
                            }
                        } catch(e) {}
                    }
                }
            }
            // 流结束兜底：若已经有内容但未经过 finalizeStreamMsg（例如仅有 answer_chunk 没有 answer_done），统一渲染一次
            if (hasAnswerStarted && fullContent) {
                finalizeStreamMsg(aiContentEl, fullContent);
            }
            aiMsgWrapper.classList.remove('streaming-msg');
            clearThinkingTimer();
            loadConversations();

            // 会话标题智能生成：对话轮数达到2轮（4条消息）时自动生成
            try {
                var msgCount = messagesContainer.querySelectorAll('.message-wrapper').length;
                if (msgCount >= 4 && currentConversationId && chatTitle.textContent === '新对话') {
                    apiRequest('/api/conversations/' + currentConversationId + '/generate-title', { method: 'POST' })
                        .then(function(res) {
                            if (res && res.generated && res.title) {
                                chatTitle.textContent = res.title;
                                loadConversations();  // 刷新侧边栏标题
                            }
                        })
                        .catch(function(e) { /* 静默失败 */ });
                }
            } catch (e) { /* 静默失败 */ }
        } catch (e) {
            // 异常时若有部分内容，仍然以 markdown 渲染兜底；否则展示错误文案
            if (aiContentEl) {
                if (fullContent) {
                    finalizeStreamMsg(aiContentEl, fullContent);
                } else {
                    if (aiFlowStatusEl) aiFlowStatusEl.style.display = 'none';
                    if (aiContentEl) aiContentEl.style.display = 'block';
                    aiContentEl.textContent = '抱歉，请求失败，请重试。';
                }
            }
            aiMsgWrapper.classList.remove('streaming-msg');
            clearThinkingTimer();
            showToast('发送失败: ' + (e.message || '未知错误'), 'error');
        }
    }

    btnSend.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', function(e) {

            e.preventDefault();

    // ===== Student Info Panel (右侧常驻面板) =====
    var infoPanel = document.getElementById('right-sidebar');
    var infoFieldsList = document.getElementById('info-fields-list');
    var infoCompletionRate = document.getElementById('info-completion-rate');
    var infoProgressBar = document.getElementById('info-progress-bar');
    var infoCompletionDetail = document.getElementById('info-completion-detail');
    var FIELDS_LABEL = {
        real_name:'姓名', age:'年龄', gender:'性别', phone:'电话', wechat:'微信',
        target_country:'目标国家', target_level:'目标学位', target_major:'目标专业',
        current_school:'当前学校', current_major:'当前专业',
        gpa:'GPA', gpa_system:'GPA制度',
        language_type:'语言考试类型', language_score:'语言成绩', budget:'预算',
        entry_time:'入学时间', current_grade:'当前年级',
        internship:'是否有实习经历', internship_duration:'实习时长',
        work_experience:'是否有工作经验', work_years:'工作年限',
        notes:'备注'
    };
    var REQUIRED_FIELDS = ['real_name','age','phone','target_country','target_level','current_school'];

    // 信息展示格式化
    function formatFieldValue(key, rawVal) {
        if (rawVal === null || rawVal === undefined || String(rawVal).trim() === '') return null;

        // GPA展示：3.5/4.0 或 3.5/5.0
        if (key === 'gpa') {
            return String(rawVal);
        }

        // 语言成绩展示：7.0/雅思 或 100/托福
        if (key === 'language_score') {
            return String(rawVal);
        }

        // 目标国家：多个国家用顿号展示（支持数组或逗号分隔字符串）
        if (key === 'target_country') {
            var val = String(rawVal);
            // 如果是数组JSON字符串，先解析
            if (val.startsWith('[')) {
                try {
                    var arr = JSON.parse(val);
                    return arr.join('、');
                } catch(e) {}
            }
            // 否则直接替换逗号
            return val.replace(/,/g, '、');
        }

        // 默认返回字符串形式
        return String(rawVal);
    }

    async function loadStudentProfile() {
        try {
            var data = await apiRequest('/api/student-profile');
            if (!data) return;
            var profile = data.profile || data;
            // 修复：completion_rate 在 data 顶层，不在 profile 字典内
            var rate = data.completion_rate != null ? data.completion_rate : (profile.completion_rate || 0);
            infoCompletionRate.textContent = rate + '%';
            infoProgressBar.style.width = rate + '%';
            infoProgressBar.style.background = rate >= 80 ? '#22c55e' : rate >= 50 ? 'var(--primary)' : '#f59e0b';

            // 计算已填写字段数（基于全部字段）
            var filledCount = 0;
            var totalCount = Object.keys(FIELDS_LABEL).length;
            var fieldsHtml = '';
            Object.keys(FIELDS_LABEL).forEach(function(key) {
                var rawVal = profile[key];
                var formatted = formatFieldValue(key, rawVal);
                var isFilled = formatted !== null;
                if (isFilled) filledCount++;

                // 特殊字段：组合显示
                var displayVal = formatted;
                if (key === 'gpa' && isFilled) {
                    var gpaSystem = profile['gpa_system'];
                    displayVal = formatted + (gpaSystem ? '/' + gpaSystem.replace('分制', '') : '');
                }
                if (key === 'language_score' && isFilled) {
                    var langType = profile['language_type'];
                    displayVal = formatted + (langType ? '/' + langType : '');
                }

                var isRequired = REQUIRED_FIELDS.indexOf(key) >= 0;
                var labelHtml = isRequired ? '<span style="color:var(--destructive)">*</span>' : '';
                var isNotes = key === 'notes';
                var valHtml = isFilled
                    ? '<span style="color:var(--foreground)' + (isNotes ? ';cursor:pointer' : '') + '"' + (isNotes ? ' title="点击查看完整内容"' : '') + '>' + String(displayVal) + '</span>'
                    : '<span style="color:var(--muted-foreground);font-style:italic">未填写</span>';
                var notesAttr = (isNotes && isFilled) ? ' data-notes-detail="' + escapeHtml(String(rawVal)) + '" onclick="showNotesDetail(this.getAttribute(\'data-notes-detail\'))"' : '';
                fieldsHtml += '<div class="flex items-center justify-between py-1 px-2 rounded text-xs" style="background:' + (isFilled ? 'color-mix(in srgb,var(--accent) 30%,var(--card))' : 'transparent') + '">' +
                    '<span style="color:var(--muted-foreground)">' + FIELDS_LABEL[key] + labelHtml + '</span>' +
                    '<span class="truncate ml-2" style="max-width:120px;text-align:right"' + notesAttr + '>' + valHtml + '</span>' +
                    '</div>';
            });
            if (infoCompletionDetail) infoCompletionDetail.textContent = '已填写 ' + filledCount + '/' + totalCount + ' 项';
            infoFieldsList.innerHTML = fieldsHtml;
        } catch(e) {
            if (infoFieldsList) infoFieldsList.innerHTML = '<div class="text-xs text-center py-4" style="color:var(--muted-foreground)">加载失败</div>';
        }
    }

    function updateInfoFieldFromSSE(field, value, rate) {
        if (!infoPanel) return;
        infoCompletionRate.textContent = (rate || 0) + '%';
        infoProgressBar.style.width = (rate || 0) + '%';
        infoProgressBar.style.background = (rate || 0) >= 80 ? '#22c55e' : (rate || 0) >= 50 ? 'var(--primary)' : '#f59e0b';
        // 重新加载完整列表以同步计数和值
        loadStudentProfile();
    }

    showEmpty();
    loadStudentProfile();
    loadConversations().then(function() {
        if (!currentConversationId && allConversations.length > 0) {
            var first = allConversations[0];
            switchConversation(first.id || first.conversation_id, first.title);
        }
    });

    // ====== 用户菜单（头像点击下拉） ======
    var navProfileBtn = document.querySelector('[data-dom-id="nav-profile"]');
    var userMenu = null;

    function closeUserMenu() {
        if (userMenu) { userMenu.remove(); userMenu = null; }
        document.removeEventListener('click', onDocumentClickCloseMenu);
    }
    function onDocumentClickCloseMenu(e) {
        if (userMenu && !userMenu.contains(e.target) && e.target !== navProfileBtn && !navProfileBtn.contains(e.target)) {
            closeUserMenu();
        }
    }
    function openUserMenu() {
        if (userMenu) { closeUserMenu(); return; }
        userMenu = document.createElement('div');
        userMenu.style.cssText = 'position:absolute;top:54px;right:16px;z-index:200;min-width:180px;background:var(--popover);color:var(--popover-foreground);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);overflow:hidden;font-size:13px';
        var userName = (window._currentUser && window._currentUser.display_name) || (window._currentUser && window._currentUser.username) || '用户';
        var userRole = (window._currentUser && window._currentUser.role) || 'client';
        var roleLabel = userRole === 'consultant' ? '顾问' : (userRole === 'admin' ? '管理员' : '学生');
        userMenu.innerHTML =
            '<div style="padding:12px 14px;border-bottom:1px solid var(--border)">' +
                '<div style="font-weight:600;margin-bottom:2px">' + escapeHtml(userName) + '</div>' +
                '<div style="color:var(--muted-foreground);font-size:12px">角色：' + escapeHtml(roleLabel) + '</div>' +
            '</div>' +
            '<button id="menu-logout" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:transparent;border:none;cursor:pointer;color:var(--foreground);text-align:left;font-size:13px">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>' +
                '退出登录' +
            '</button>';
        document.body.appendChild(userMenu);
        document.getElementById('menu-logout').addEventListener('click', function() {
            localStorage.removeItem('rag-auth-token');
            localStorage.removeItem('rag-auth-user');
            closeUserMenu();
            window.location.replace('/login.html');
        });
        setTimeout(function() {
            document.addEventListener('click', onDocumentClickCloseMenu);
        }, 0);
    }
    if (navProfileBtn) {
        navProfileBtn.style.cursor = 'pointer';
        navProfileBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            openUserMenu();
        });
    }

    // 页面加载时获取用户信息并更新头像
    (async function loadUserInfo() {
        // 优先从 localStorage 读取登录时存储的用户信息
        var storedUser = null;
        try {
            var raw = localStorage.getItem('rag-auth-user');
            if (raw) storedUser = JSON.parse(raw);
        } catch(e) {}

        // 尝试从 /api/auth/me 获取最新信息
        try {
            var resp = await fetch(API_BASE + '/api/auth/me', {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('rag-auth-token') }
            });
            if (resp.ok) {
                var data = await resp.json();
                window._currentUser = data;
                var displayName = data.display_name || data.username || (storedUser && storedUser.display_name) || (storedUser && storedUser.username) || '用户';
                var avatarEl = document.getElementById('user-avatar');
                var nameEl = document.getElementById('user-name');
                if (avatarEl) avatarEl.textContent = displayName.charAt(0);
                if (nameEl) nameEl.textContent = displayName;
                return;
            }
        } catch(e) { /* 静默失败 */ }

        // 后备：使用 localStorage 中的数据
        if (storedUser) {
            window._currentUser = storedUser;
            var displayName = storedUser.display_name || storedUser.username || '用户';
            var avatarEl = document.getElementById('user-avatar');
            var nameEl = document.getElementById('user-name');
            if (avatarEl) avatarEl.textContent = displayName.charAt(0);
            if (nameEl) nameEl.textContent = displayName;
        }
    })();

    // ====== 问题模板按钮 ======
    var templateBtn = document.querySelector('button[class*="flex items-center gap-1"]');
    // 精确定位问题模板按钮（包含 lightbulb 图标）
    var allBtns = document.querySelectorAll('button');
    var templateBtnEl = null;
    for (var i = 0; i < allBtns.length; i++) {
        if (allBtns[i].textContent.indexOf('问题模板') >= 0) {
            templateBtnEl = allBtns[i];
            break;
        }
    }
    if (templateBtnEl) {
        templateBtnEl.style.cursor = 'pointer';
        templateBtnEl.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            // 切换显示预设问题面板
            var existingPanel = document.getElementById('template-panel');
            if (existingPanel) {
                existingPanel.remove();
                return;
            }
            var templates = [
                { cat: '留学规划', qs: ['美国留学申请的时间线是什么？', '英国硕士申请需要准备哪些材料？', '如何选择适合自己的留学国家？'] },
                { cat: '费用奖学金', qs: ['各国留学费用对比情况如何？', '有哪些可以申请的留学奖学金？', '留学生可以申请贷款吗？'] },
                { cat: '签证政策', qs: ['美国F1签证办理流程是什么？', '英国学生签证需要哪些材料？', '留学生回国落户政策有哪些？'] },
                { cat: '院校申请', qs: ['美国TOP50大学申请要求是什么？', '英国G5院校有哪些申请技巧？', '如何提高名校录取率？'] }
            ];
            var panel = document.createElement('div');
            panel.id = 'template-panel';
            panel.style.cssText = 'position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:100;width:min(560px,90vw);max-height:60vh;overflow-y:auto;background:var(--popover);color:var(--popover-foreground);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,0.16);padding:12px';
            var html = '';
            for (var t = 0; t < templates.length; t++) {
                html += '<div style="margin-bottom:10px">';
                html += '<div style="font-size:12px;font-weight:600;color:var(--muted-foreground);margin-bottom:6px;padding:0 4px">' + escapeHtml(templates[t].cat) + '</div>';
                html += '<div style="display:flex;flex-direction:column;gap:4px">';
                for (var q = 0; q < templates[t].qs.length; q++) {
                    html += '<button class="tpl-q-btn" data-q="' + escapeHtml(templates[t].qs[q]) + '" style="text-align:left;padding:8px 12px;background:var(--muted);color:var(--foreground);border:none;border-radius:8px;cursor:pointer;font-size:13px;transition:background 0.15s">' + escapeHtml(templates[t].qs[q]) + '</button>';
                }
                html += '</div></div>';
            }
            panel.innerHTML = html;
            document.body.appendChild(panel);
            // 绑定点击事件
            var qBtns = panel.querySelectorAll('.tpl-q-btn');
            for (var j = 0; j < qBtns.length; j++) {
                qBtns[j].addEventListener('mouseover', function() { this.style.background = 'var(--accent)'; });
                qBtns[j].addEventListener('mouseout', function() { this.style.background = 'var(--muted)'; });
                qBtns[j].addEventListener('click', function() {
                    if (messageInput) {
                        messageInput.value = this.getAttribute('data-q');
                        messageInput.dispatchEvent(new Event('input'));
                        messageInput.focus();
                    }
                    panel.remove();
                });
            }
            // 点击外部关闭
            setTimeout(function() {
                document.addEventListener('click', function closeTpl(ev) {
                    if (!panel.contains(ev.target) && ev.target !== templateBtnEl) {
                        panel.remove();
                        document.removeEventListener('click', closeTpl);
                    }
                });
            }, 0);
        });
    }
})();

    <script>
        // 注册Service Worker（修正路径）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                // 尝试多个可能的路径
                const swPaths = ['/frontend/sw.js', '/sw.js', './sw.js'];
                let registered = false;

                swPaths.forEach(function(path) {
                    if (!registered) {
                        navigator.serviceWorker.register(path)
                            .then(function(registration) {
                                registered = true;
                                console.log('[SW] 注册成功，路径:', path, '作用域:', registration.scope);
                            })
                            .catch(function(error) {
                                console.log('[SW] 路径注册失败:', path, error.message);
                            });
                    }
                });
            });
        }
    </script>
