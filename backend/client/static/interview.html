<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 模拟面试 - 留学通</title>
<style>
:root {
  --background: #ffffff;
  --foreground: #0e1115;
  --card: #ffffff;
  --card-foreground: #0e1115;
  --popover: #f9f9fa;
  --popover-foreground: #0e1115;
  --primary: #0065fd;
  --primary-foreground: #ffffff;
  --secondary: #eff1f4;
  --secondary-foreground: #333942;
  --muted: #eff1f4;
  --muted-foreground: #7f8d9f;
  --accent: #e5e9ff;
  --accent-foreground: #00266b;
  --destructive: #ef4444;
  --destructive-foreground: #ffffff;
  --border: #e7eaef;
  --input: #e7eaef;
  --ring: #557fff;
  --chart-1: #557fff;
  --chart-2: #0065fd;
  --chart-3: #0057da;
  --chart-4: #0043ad;
  --chart-5: #002e7d;
  --radius: 1.2rem;
  --font-sans: Stack Sans Text, ui-sans-serif, sans-serif, system-ui;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-sans);
  background: var(--background);
  color: var(--foreground);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ====== Layout ====== */
.app-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 50px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}
.header-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--foreground);
}

.header-back {
  font-size: 12px;
  color: var(--primary);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 8px;
  background: var(--accent);
  transition: opacity .15s;
}

.header-back:hover { opacity: .8; }

.main-content {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.sidebar {
  width: 320px;
  border-left: 1px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: width 0.2s;
}

/* ===== 右侧栏统一折叠/展开按钮（三页一致） ===== */
.sidebar-toggle {
  width: 24px;
  height: 24px;
  background: var(--muted);
  color: var(--foreground);
  border: none;
  border-radius: 6px;
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.sidebar-toggle:hover { background: var(--accent); color: var(--primary); }

.sidebar-expand {
  display: none;
  position: fixed;
  top: 60px;
  right: 0;
  z-index: 50;
  width: 24px;
  height: 48px;
  background: var(--card);
  border: 1px solid var(--border);
  border-right: 0;
  border-radius: 6px 0 0 6px;
  cursor: pointer;
  color: var(--foreground);
  font-size: 16px;
  line-height: 1;
  box-shadow: -2px 0 6px rgba(0,0,0,0.04);
}

.sidebar-resizer {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  flex: none;
  transition: background 0.2s;
}
.sidebar-resizer:hover, .sidebar-resizer:active { background: var(--primary); }

/* ====== Setup Phase ====== */
.setup-container {
  flex: 1;
  overflow-y: auto;
  padding: 32px 24px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.setup-card {
  max-width: 560px;
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
}

.setup-title {
  font-size: 22px;
  font-weight: 700;
  margin: 0 0 6px;
}

.setup-subtitle {
  font-size: 12px;
  color: var(--muted-foreground);
  margin: 0 0 24px;
}

.form-row { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--foreground);
  margin-bottom: 6px;
}

.form-input, .form-select {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--input);
  border-radius: 8px;
  font-size: 12px;
  outline: none;
  background: var(--card);
  color: var(--foreground);
  font-family: inherit;
  transition: border-color .15s;
}

.form-input:focus, .form-select:focus {
  border-color: var(--primary);
}

.form-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 38px;
  padding: 0 16px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: opacity .15s;
  font-family: inherit;
}

.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: var(--primary-foreground); }
.btn-outline { background: var(--card); color: var(--foreground); border: 1px solid var(--border); }
.btn-ghost { background: transparent; color: var(--foreground); }
.btn-block { width: 100%; }
.btn-lg { height: 44px; font-size: 14px; }
.btn:hover:not(:disabled) { opacity: .88; }

/* ====== Chat ====== */
.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
}

.chat-header-info {
  flex: 1;
  min-width: 0;
}

.chat-header-title {
  font-size: 14px;
  font-weight: 600;
}

.chat-header-meta {
  font-size: 11px;
  color: var(--muted-foreground);
  margin-top: 2px;
}

.progress-bar {
  height: 4px;
  background: var(--muted);
  border-radius: 2px;
  overflow: hidden;
  width: 120px;
}

.progress-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width .3s;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.message {
  display: flex;
  gap: 10px;
  max-width: 80%;
  animation: fadeIn .2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  background: var(--accent);
}

.message.user .avatar { background: var(--primary); color: var(--primary-foreground); }

.bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 12px;
  line-height: 1.6;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.message.interviewer .bubble {
  background: var(--accent);
  color: var(--foreground);
  border-top-left-radius: 4px;
}

.message.user .bubble {
  background: var(--primary);
  color: var(--primary-foreground);
  border-top-right-radius: 4px;
}

.message.system .bubble {
  background: var(--muted);
  color: var(--muted-foreground);
  font-size: 12px;
  font-style: italic;
}

.message.evaluation .bubble {
  background: #fff8e6;
  color: var(--foreground);
  border: 1px solid #ffd666;
  border-top-left-radius: 4px;
}

.evaluation-score {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 12px;
  margin-right: 8px;
  color: #fff;
}

.dim-badges {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.dim-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(0, 101, 253, 0.1);
  color: var(--primary);
}

/* ====== Loading ====== */
.loading-dots::after {
  content: '';
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

.cursor-blink {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--primary);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink .8s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ====== Input Area ====== */
.input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--card);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-textarea {
  flex: 1;
  border: 1px solid var(--input);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  outline: none;
  background: var(--card);
  color: var(--foreground);
  font-family: inherit;
  resize: none;
  min-height: 42px;
  max-height: 140px;
  line-height: 1.5;
  transition: border-color .15s;
}

.input-textarea:focus { border-color: var(--primary); }
.input-textarea:disabled { background: var(--muted); cursor: not-allowed; }

/* ====== Sidebar ====== */
.sidebar-section {
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section.flex-1 { flex: 1; min-height: 0; }
.sidebar-section.score-section { max-height: 60%; }

.sidebar-header {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 700;
  background: var(--secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.score-card {
  background: var(--secondary);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 12px;
}

.score-card.pending {
  opacity: .5;
  background: var(--muted);
}

.score-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.score-card-title {
  font-weight: 600;
  font-size: 12px;
}

.score-card-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
}

.score-card.pending .score-card-score { color: var(--muted-foreground); }

.score-card-dims {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 8px;
  font-size: 10px;
  color: var(--muted-foreground);
}

.score-dim {
  display: flex;
  justify-content: space-between;
}

.score-dim-value {
  font-weight: 600;
  color: var(--foreground);
}

.empty-state {
  text-align: center;
  color: var(--muted-foreground);
  font-size: 12px;
  padding: 24px 12px;
}

/* ====== History List ====== */
.history-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 6px;
  background: var(--secondary);
  transition: background .15s;
}

.history-item:hover { background: var(--accent); }

.history-item-title {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-item-meta {
  font-size: 10px;
  color: var(--muted-foreground);
  display: flex;
  justify-content: space-between;
}

.history-item-status {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 600;
}

.history-item-status.completed { background: #dcfce7; color: #16a34a; }
.history-item-status.in_progress { background: #fef3c7; color: #d97706; }
.history-item-status.pending { background: var(--muted); color: var(--muted-foreground); }

/* ====== Report ====== */
.report-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  justify-content: center;
}

.report-card {
  max-width: 760px;
  width: 100%;
}

.report-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.summary-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.summary-stat-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
}

.summary-stat-label {
  font-size: 11px;
  color: var(--muted-foreground);
  margin-top: 2px;
}

.radar-container {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: center;
}

.radar-container svg {
  max-width: 320px;
  width: 100%;
  height: auto;
}

.report-content {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  font-size: 12px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.report-content h1,
.report-content h2,
.report-content h3 {
  margin-top: 16px;
  margin-bottom: 8px;
  color: var(--foreground);
}

.report-content h1 { font-size: 18px; }
.report-content h2 { font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.report-content h3 { font-size: 14px; }

.report-content ul,
.report-content ol {
  padding-left: 20px;
  margin: 8px 0;
}

.report-content code {
  background: var(--muted);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
}

.report-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

/* ====== Markdown simple ====== */
.markdown-body h1 { font-size: 20px; font-weight: 700; margin: 16px 0 8px; }
.markdown-body h2 { font-size: 16px; font-weight: 700; margin: 14px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.markdown-body h3 { font-size: 14px; font-weight: 600; margin: 12px 0 6px; }
.markdown-body p { margin: 6px 0; }
.markdown-body ul, .markdown-body ol { padding-left: 20px; margin: 6px 0; }
.markdown-body li { margin: 3px 0; }
.markdown-body strong { font-weight: 700; }
.markdown-body code { background: var(--muted); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

/* ====== Responsive（三页统一：右侧栏始终常驻，不在小屏隐藏） ====== */
@media (max-width: 900px) {
  .form-grid-2 { grid-template-columns: 1fr; }
  .report-summary { grid-template-columns: 1fr 1fr; }
}

/* ===== 左侧导航栏统一CSS（三页一致） ===== */
.left-sidebar {
  width: 240px;
  background: var(--card);
  border-right: 1px solid var(--border);
  position: relative;
  transition: width 0.2s;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.left-sidebar.minimized { width: 56px !important; }
.left-sidebar .left-nav-label {
  padding: 12px 12px 8px;
  margin: 0;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted-foreground);
  letter-spacing: 0.05em;
}
.left-sidebar.minimized .left-nav-label,
.left-sidebar.minimized .left-nav-text { display: none; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 40px;
  padding: 0 12px;
  cursor: pointer;
  border-left: 3px solid transparent;
  font-size: 12px;
  color: var(--foreground);
  text-decoration: none;
}
.nav-item:hover { background: var(--muted); }
.nav-item.active {
  background: color-mix(in srgb, var(--accent) 50%, var(--card));
  border-left-color: var(--primary) !important;
  color: var(--primary);
  font-weight: 600;
  border-radius: 0 6px 6px 0;
}
.left-sidebar.dragging { transition: none; }  /* 拖动时禁用transition，解决"不跟手" */
.left-nav-text { color: var(--foreground); }
</style>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
</head>
<body>

<div class="app-container">
  <!-- Header -->
  <div class="header">
    <div class="flex items-center gap-2" style="display:flex;align-items:center;gap:8px">
      <span class="flex items-center justify-center rounded-lg text-sm font-bold shrink-0" style="width:30px;height:30px;background:var(--primary);color:var(--primary-foreground);border-radius:8px;display:flex;align-items:center;justify-content:center">
        <i data-lucide="graduation-cap" style="width:17px;height:17px"></i>
      </span>
      <span class="text-base font-bold whitespace-nowrap" style="color:var(--foreground);font-size:16px;font-weight:700">留学通</span>
    </div>
    <span style="flex:1"></span>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- ===== 左侧导航栏（三页统一） ===== -->
    <aside id="left-sidebar" class="left-sidebar" style="width:240px;background:var(--card);border-right:1px solid var(--border);position:relative;display:flex;flex-direction:column;flex-shrink:0">
      <!-- 导航项区域 -->
      <div class="flex-1 overflow-y-auto py-2" style="padding-top:8px">
        <a href="/" class="nav-item flex items-center gap-2.5 px-3 cursor-pointer" style="height:40px;border-left:3px solid transparent;text-decoration:none">
          <span style="font-size:14px;line-height:1;flex-shrink:0">💬</span>
          <span class="text-sm left-nav-text" style="color:var(--foreground)">AI对话</span>
        </a>
        <a href="/interview.html" class="nav-item active flex items-center gap-2.5 px-3 cursor-pointer" style="height:40px;border-left:3px solid transparent;text-decoration:none">
          <span style="font-size:14px;line-height:1;flex-shrink:0">🎓</span>
          <span class="text-sm left-nav-text" style="color:var(--foreground)">模拟面试</span>
        </a>
        <a href="/scenario.html" class="nav-item flex items-center gap-2.5 px-3 cursor-pointer" style="height:40px;border-left:3px solid transparent;text-decoration:none">
          <span style="font-size:14px;line-height:1;flex-shrink:0">🌐</span>
          <span class="text-sm left-nav-text" style="color:var(--foreground)">情景对话</span>
        </a>
      </div>
      <!-- 最小化按钮（绝对定位右上角） -->
      <button id="left-sidebar-toggle" title="最小化导航栏" class="flex items-center justify-center rounded cursor-pointer" style="position:absolute;top:12px;right:8px;width:24px;height:24px;background:var(--muted);color:var(--foreground);border:none;font-size:14px;line-height:1;z-index:5;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0">‹</button>
    </aside>
    <!-- 拖动手柄 -->
    <div id="left-sidebar-resizer" style="width:4px;cursor:col-resize;background:transparent;flex:none"></div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area">

      <!-- Setup Phase -->
      <div class="setup-container" id="setup-phase">
        <div class="setup-card">
          <h1 class="setup-title">配置你的面试</h1>
          <p class="setup-subtitle">AI 将根据你的目标院校和专业生成针对性的英文面试问题，全程模拟真实面试场景</p>

          <div class="form-row">
            <label class="form-label">目标院校</label>
            <input id="input-school" class="form-input" placeholder="如：MIT、Stanford、Oxford" value="MIT">
          </div>

          <div class="form-row">
            <label class="form-label">目标专业</label>
            <input id="input-major" class="form-input" placeholder="如：Computer Science" value="Computer Science">
          </div>

          <div class="form-grid-2">
            <div class="form-row">
              <label class="form-label">学位层次</label>
              <select id="select-degree" class="form-select">
                <option value="本科">本科</option>
                <option value="硕士" selected>硕士</option>
                <option value="博士">博士</option>
              </select>
            </div>
            <div class="form-row">
              <label class="form-label">面试类型</label>
              <select id="select-type" class="form-select">
                <option value="admission" selected>录取面试</option>
                <option value="visa">签证面试</option>
                <option value="scholarship">奖学金面试</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <label class="form-label">题目数量：<span id="label-count" style="color:var(--primary);font-weight:700;">5</span> 题</label>
            <input id="input-count" type="range" min="1" max="10" value="5" style="width:100%;accent-color:var(--primary);">
          </div>

          <div class="form-row">
            <label class="form-label">评估模式</label>
            <div style="display:flex;gap:8px;">
              <label style="flex:1;display:flex;align-items:center;gap:6px;padding:10px 12px;border:1px solid var(--input);border-radius:8px;cursor:pointer;font-size:13px;" id="mode-per-label">
                <input type="radio" name="eval-mode" value="per_question" checked style="accent-color:var(--primary);">
                <span><strong>逐题判分</strong><br><span style="font-size:11px;color:var(--muted-foreground);">每题答完即时评分</span></span>
              </label>
              <label style="flex:1;display:flex;align-items:center;gap:6px;padding:10px 12px;border:1px solid var(--input);border-radius:8px;cursor:pointer;font-size:13px;" id="mode-full-label">
                <input type="radio" name="eval-mode" value="full_simulation" style="accent-color:var(--primary);">
                <span><strong>全真模拟</strong><br><span style="font-size:11px;color:var(--muted-foreground);">全部答完后统一评分</span></span>
              </label>
            </div>
          </div>

          <button id="btn-start" class="btn btn-primary btn-block btn-lg">开始面试</button>

          <div style="margin-top:20px;padding:12px;background:var(--accent);border-radius:8px;font-size:12px;color:var(--accent-foreground);line-height:1.6;">
            <strong>💡 面试说明：</strong><br>
            1. AI 会用英文提问，你可以用英文或中文回答（建议英文）<br>
            2. <span id="mode-tip">逐题判分模式：每答完一题即时给出五维度评分和反馈</span><br>
            3. 所有题目答完后，将生成完整的中文分析报告
          </div>
        </div>
      </div>

      <!-- Interview Phase (hidden initially) -->
      <div id="interview-phase" style="display:none;flex:1;flex-direction:column;overflow:hidden;">

        <!-- Chat Header -->
        <div class="chat-header">
          <span style="font-size:18px;">🧑‍🏫</span>
          <div class="chat-header-info">
            <div class="chat-header-title" id="header-title">面试进行中</div>
            <div class="chat-header-meta" id="header-meta">第 1 题 / 共 5 题</div>
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill" id="header-progress" style="width:20%;"></div>
          </div>
          <button id="btn-end" class="btn btn-outline" style="height:30px;padding:0 12px;font-size:12px;">结束面试</button>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="messages"></div>

        <!-- Input -->
        <div class="input-area">
          <textarea id="input-answer" class="input-textarea" placeholder="在此输入你的回答..." rows="2" disabled></textarea>
          <button id="btn-submit" class="btn btn-primary" style="height:42px;padding:0 20px;" disabled>提交回答</button>
        </div>
      </div>

      <!-- Report Phase (hidden initially) -->
      <div id="report-phase" style="display:none;flex:1;overflow-y:auto;">
        <div class="report-container">
          <div class="report-card">
            <h2 style="font-size:20px;font-weight:700;margin:0 0 16px;">📊 面试分析报告</h2>

            <div class="report-summary" id="report-summary"></div>

            <div class="radar-container">
              <svg id="radar-chart" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>

            <div class="report-content markdown-body" id="report-content"></div>

            <div class="report-actions">
              <button id="btn-restart" class="btn btn-primary btn-block">重新面试</button>
              <button id="btn-history-back" class="btn btn-outline">查看面试历史</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 浮动展开按钮（侧边栏收起时显示，三页统一） -->
    <button id="sidebar-expand" class="sidebar-expand" title="展开侧边栏">&raquo;</button>

    <!-- 拖动手柄（三页统一） -->
    <div id="sidebar-resizer" class="sidebar-resizer"></div>

    <!-- Sidebar（三页统一：ID=right-sidebar，宽度/折叠状态从 localStorage 读取） -->
    <aside class="sidebar" id="right-sidebar">

      <!-- Score Panel -->
      <div class="sidebar-section score-section">
        <div class="sidebar-header">
          <span>📈</span>
          <span>实时评分</span>
          <span style="flex:1"></span>
          <button id="sidebar-toggle" class="sidebar-toggle" title="收起侧边栏">&laquo;</button>
        </div>
        <div class="sidebar-body" id="score-panel">
          <div class="empty-state">开始面试后，每题评分将显示在这里</div>
        </div>
      </div>

      <!-- History -->
      <div class="sidebar-section flex-1">
        <div class="sidebar-header">
          <span>📜</span>
          <span>面试历史</span>
          <span style="flex:1"></span>
          <button id="btn-refresh-history" class="btn btn-ghost" style="height:24px;padding:0 8px;font-size:11px;">刷新</button>
        </div>
        <div class="sidebar-body" id="history-list">
          <div class="empty-state">暂无历史记录</div>
        </div>
      </div>

    </aside>

  </div>
</div>

<script>
// ====== 认证 ======
const token = localStorage.getItem('rag-auth-token') || sessionStorage.getItem('rag-auth-token');
if (!token) {
  alert('请先登录后再使用模拟面试功能');
  window.location.href = '/login.html';
}

// ====== 全局状态 ======
const state = {
  phase: 'setup', // setup / interview / report
  sessionId: null,
  evaluationMode: 'per_question', // per_question / full_simulation
  totalQuestions: 5,
  currentIndex: 0,
  currentQuestionId: '',
  questions: [],
  evaluations: [],
  submitting: false,
};

// 维度标签：评分维度 + 题目维度
const DIM_LABELS = {
  content: '内容完整度',
  logic: '逻辑结构',
  expression: '表达专业度',
  depth: '深度与细节',
  relevance: '相关性',
  academic: '学术背景',
  research: '研究兴趣',
  motivation: '动机',
  career: '职业规划',
  personal: '个人特质',
  comprehensive: '综合',
};

// ====== 工具函数 ======
function $(id) { return document.getElementById(id); }

function showPhase(phase) {
  state.phase = phase;
  $('setup-phase').style.display = phase === 'setup' ? 'flex' : 'none';
  $('interview-phase').style.display = phase === 'interview' ? 'flex' : 'none';
  $('report-phase').style.display = phase === 'report' ? 'block' : 'none';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addMessage(role, text, options = {}) {
  const messages = $('messages');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;
  if (options.className) msg.classList.add(options.className);

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '我' : (role === 'interviewer' ? '🧑‍🏫' : role === 'evaluation' ? '📊' : '⚙️');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'evaluation') {
    // 评估消息：后端 0-100 分制，前端显示为 0-10 分制
    const score = options.score || 0;
    const score10 = (score / 10).toFixed(1);
    const scoreColor = score >= 80 ? '#16a34a' : score >= 60 ? '#d97706' : '#dc2626';
    let html = `<span class="evaluation-score" style="background:${scoreColor};">${score10}/10</span>`;
    if (options.feedback) html += `<div style="margin-top:6px;">${escapeHtml(options.feedback)}</div>`;
    if (options.dimensions) {
      html += '<div class="dim-badges">';
      for (const [k, v] of Object.entries(options.dimensions)) {
        const v10 = (v / 10).toFixed(1);
        html += `<span class="dim-badge">${DIM_LABELS[k] || k}: ${v10}</span>`;
      }
      html += '</div>';
    }
    bubble.innerHTML = html;
  } else if (options.html) {
    bubble.innerHTML = options.html;
  } else {
    bubble.textContent = text;
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return { msg, bubble };
}

function setProgress(current, total) {
  const percent = Math.round(((current + 1) / total) * 100);
  $('header-progress').style.width = percent + '%';
  $('header-meta').textContent = `第 ${current + 1} 题 / 共 ${total} 题`;
}

function updateScorePanel() {
  const panel = $('score-panel');
  // 全真模拟模式：不显示逐题评分，仅显示进度
  if (state.evaluationMode === 'full_simulation') {
    const answered = state.evaluations.length > 0
      ? state.evaluations.length
      : (state.currentIndex + (state.submitting ? 1 : 0));
    panel.innerHTML = `
      <div class="empty-state" style="padding:20px 12px;">
        <div style="font-size:28px;margin-bottom:8px;">🎭</div>
        <div style="font-weight:600;color:var(--foreground);">全真模拟模式</div>
        <div style="font-size:11px;margin-top:4px;">所有题目答完后统一评分</div>
        <div style="margin-top:12px;font-size:13px;color:var(--primary);font-weight:700;">
          已答 ${Math.min(state.currentIndex + (state.submitting ? 1 : 0), state.totalQuestions)} / ${state.totalQuestions} 题
        </div>
      </div>`;
    return;
  }

  // 逐题判分模式
  if (state.evaluations.length === 0 && state.currentIndex === 0) {
    panel.innerHTML = '<div class="empty-state">开始面试后，每题评分将显示在这里</div>';
    return;
  }

  let html = '';
  for (let i = 0; i < state.totalQuestions; i++) {
    const evalData = state.evaluations.find(e => e.index === i);
    const isCurrent = i === state.currentIndex && !evalData;
    if (evalData) {
      const score = evalData.score;
      const score10 = (score / 10).toFixed(1);
      const scoreColor = score >= 80 ? '#16a34a' : score >= 60 ? '#d97706' : '#dc2626';
      const dimsHtml = Object.entries(evalData.dimensions).map(([k, v]) =>
        `<div class="score-dim"><span>${DIM_LABELS[k] || k}</span><span class="score-dim-value">${(v / 10).toFixed(1)}</span></div>`
      ).join('');
      html += `
        <div class="score-card">
          <div class="score-card-header">
            <span class="score-card-title">第 ${i + 1} 题</span>
            <span class="score-card-score" style="color:${scoreColor};">${score10}/10</span>
          </div>
          <div class="score-card-dims">${dimsHtml}</div>
        </div>`;
    } else if (isCurrent) {
      html += `
        <div class="score-card pending">
          <div class="score-card-header">
            <span class="score-card-title">第 ${i + 1} 题 · 进行中</span>
            <span class="score-card-score">--</span>
          </div>
          <div style="font-size:10px;color:var(--muted-foreground);">等待回答与评分...</div>
        </div>`;
    } else {
      html += `
        <div class="score-card pending">
          <div class="score-card-header">
            <span class="score-card-title">第 ${i + 1} 题</span>
            <span class="score-card-score">--</span>
          </div>
          <div style="font-size:10px;color:var(--muted-foreground);">未开始</div>
        </div>`;
    }
  }
  panel.innerHTML = html;
}

// ====== API 工具函数 ======
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok || !data.success) {
    throw new Error(data.detail || data.message || `请求失败 (${res.status})`);
  }
  return data.data;
}

// ====== 显示问题气泡 ======
function showQuestion(question, index) {
  const dimLabel = DIM_LABELS[question.dimension] || question.dimension || '综合';
  const html = `<span style="font-size:11px;color:var(--muted-foreground);display:block;margin-bottom:4px;">第 ${index + 1} 题 · ${escapeHtml(dimLabel)}</span>${escapeHtml(question.question_text)}`;
  addMessage('interviewer', '', { html });
}

// ====== 显示加载气泡 ======
function showLoading(text) {
  const { msg, bubble } = addMessage('system', '');
  bubble.innerHTML = `${escapeHtml(text)}<span class="loading-dots"></span>`;
  msg.dataset.role = 'loading';
  return { msg, bubble };
}

// ====== 模式切换 UI 更新 ======
document.querySelectorAll('input[name="eval-mode"]').forEach(radio => {
  radio.addEventListener('change', (e) => {
    const mode = e.target.value;
    $('mode-tip').textContent = mode === 'per_question'
      ? '逐题判分模式：每答完一题即时给出五维度评分和反馈'
      : '全真模拟模式：所有题目连续作答，最后统一评分';
    $('mode-per-label').style.borderColor = mode === 'per_question' ? 'var(--primary)' : 'var(--input)';
    $('mode-full-label').style.borderColor = mode === 'full_simulation' ? 'var(--primary)' : 'var(--input)';
    $('mode-per-label').style.background = mode === 'per_question' ? 'var(--accent)' : 'var(--card)';
    $('mode-full-label').style.background = mode === 'full_simulation' ? 'var(--accent)' : 'var(--card)';
  });
});

// 初始化模式样式
$('mode-per-label').style.borderColor = 'var(--primary)';
$('mode-per-label').style.background = 'var(--accent)';

// ====== 开始面试 ======
$('btn-start').addEventListener('click', async () => {
  const school = $('input-school').value.trim();
  const major = $('input-major').value.trim();
  const degree = $('select-degree').value;
  const interviewType = $('select-type').value;
  const totalQuestions = parseInt($('input-count').value, 10);
  const evaluationMode = document.querySelector('input[name="eval-mode"]:checked').value;

  if (!school) { alert('请填写目标院校'); return; }
  if (!major) { alert('请填写目标专业'); return; }

  $('btn-start').disabled = true;
  $('btn-start').textContent = '正在启动面试...';

  // 切换到面试界面
  showPhase('interview');
  state.evaluationMode = evaluationMode;
  state.totalQuestions = totalQuestions;
  state.currentIndex = 0;
  state.questions = [];
  state.evaluations = [];
  state.submitting = false;
  $('messages').innerHTML = '';
  $('header-title').textContent = `${school} · ${major} · ${degree}`;
  setProgress(0, totalQuestions);
  updateScorePanel();

  // 显示"正在生成问题"提示
  const loading = showLoading('AI 正在生成你的专属面试题');
  let started = false;
  let loadingRemoved = false;
  const removeStartLoading = () => {
    if (!loadingRemoved && loading && loading.msg && loading.msg.parentNode) {
      loading.msg.remove();
      loadingRemoved = true;
    }
  };

  try {
    // 1. 创建会话
    const createData = await api('POST', '/api/mock-interview/sessions', {
      school, major,
      interview_type: interviewType,
      difficulty: 'advanced',
      question_count: totalQuestions,
      evaluation_mode: evaluationMode,
    });
    state.sessionId = createData.session_id;

    // 2. 开始面试，获取第一题
    const startData = await api('POST', `/api/mock-interview/sessions/${state.sessionId}/start`);
    state.totalQuestions = startData.total_questions || totalQuestions;
    state.evaluationMode = startData.evaluation_mode || evaluationMode;
    state.currentIndex = startData.current_question_index || 0;

    // 关键修复：在显示第一题"之前"移除 loading 气泡，避免与题目气泡并存
    removeStartLoading();

    if (startData.current_question) {
      state.currentQuestionId = startData.current_question.question_id;
      state.questions[state.currentIndex] = {
        index: state.currentIndex,
        question_id: startData.current_question.question_id,
        text: startData.current_question.question_text,
        dimension: startData.current_question.dimension,
      };
      showQuestion(startData.current_question, state.currentIndex);
      setProgress(state.currentIndex, state.totalQuestions);
    }
    started = true;

    // 启用输入
    $('input-answer').disabled = false;
    $('btn-submit').disabled = false;
    $('input-answer').focus();

  } catch (e) {
    console.error('启动面试失败:', e);
    alert('面试启动失败: ' + e.message);
    setTimeout(() => {
      showPhase('setup');
      $('btn-start').disabled = false;
      $('btn-start').textContent = '开始面试';
    }, 100);
  } finally {
    // 兜底：确保 loading 气泡被移除（无论成功失败）
    removeStartLoading();
    // 启动失败时，确保按钮恢复
    if (!started) {
      $('btn-start').disabled = false;
      $('btn-start').textContent = '开始面试';
    }
  }
});

// ====== 提交回答 ======
async function handleSubmitAnswer() {
  if (state.submitting) return;
  const answer = $('input-answer').value.trim();
  if (!answer) { alert('请输入你的回答'); return; }
  if (!state.sessionId) { alert('面试未启动'); return; }

  state.submitting = true;
  $('btn-submit').disabled = true;
  $('input-answer').disabled = true;
  $('btn-submit').textContent = '处理中...';

  // 显示用户回答
  addMessage('user', answer);
  $('input-answer').value = '';

  // 显示加载提示（根据模式不同文案）
  const loadingText = state.evaluationMode === 'per_question'
    ? '正在评估你的回答'
    : '回答已记录，正在准备下一题';
  const evalLoading = showLoading(loadingText);
  let evalLoadingRemoved = false;
  // 统一的 loading 移除函数（幂等，避免多处残留）
  const removeEvalLoading = () => {
    if (!evalLoadingRemoved && evalLoading && evalLoading.msg && evalLoading.msg.parentNode) {
      evalLoading.msg.remove();
      evalLoadingRemoved = true;
    }
  };

  try {
    // 提交回答
    const answerData = await api('POST', `/api/mock-interview/sessions/${state.sessionId}/answer`, {
      answer_text: answer,
      question_id: state.currentQuestionId,
      question_index: state.currentIndex,
    });

    // 逐题判分模式：显示评估结果
    if (state.evaluationMode === 'per_question' && answerData.current_evaluation) {
      const ev = answerData.current_evaluation;
      state.evaluations.push({
        index: state.currentIndex,
        score: ev.overall_score,
        dimensions: ev.dimension_scores,
        feedback: ev.ai_feedback,
        strengths: ev.strengths,
        weaknesses: ev.weaknesses,
        suggestions: ev.suggestions,
      });
      // 关键修复：在显示评估结果"之前"移除 evalLoading，避免与下一题的 nextLoading 并存
      removeEvalLoading();
      addMessage('evaluation', '', {
        score: ev.overall_score,
        dimensions: ev.dimension_scores,
        feedback: ev.ai_feedback,
      });
      updateScorePanel();
    } else {
      // 全真模拟模式：移除 evalLoading 后再更新进度
      removeEvalLoading();
      updateScorePanel();
    }

    // 判断是否为最后一题
    const isLast = answerData.is_last_question || (state.currentIndex + 1 >= state.totalQuestions);

    if (isLast) {
      // 最后一题答完，进入报告生成
      await showReportLoadingAndGenerate();
    } else {
      // 进入下一题（loadNextQuestion 内部会恢复输入）
      await loadNextQuestion();
    }

  } catch (e) {
    console.error('提交回答失败:', e);
    alert('提交失败: ' + e.message);
    // 错误情况下恢复输入
    $('input-answer').disabled = false;
    $('btn-submit').disabled = false;
    $('btn-submit').textContent = '提交回答';
    state.submitting = false;
  } finally {
    // 兜底：确保 evalLoading 被移除（例如 API 调用失败时）
    removeEvalLoading();
  }
}

// ====== 加载下一题 ======
async function loadNextQuestion() {
  const nextLoading = showLoading('AI 正在准备下一题');
  let nextLoadingRemoved = false;
  const removeNextLoading = () => {
    if (!nextLoadingRemoved && nextLoading && nextLoading.msg && nextLoading.msg.parentNode) {
      nextLoading.msg.remove();
      nextLoadingRemoved = true;
    }
  };

  try {
    const nextData = await api('POST', `/api/mock-interview/sessions/${state.sessionId}/next`);

    if (nextData.is_completed) {
      // 面试已完成（边界情况）：先移除 loading 再展示报告
      removeNextLoading();
      await showReportFromData(nextData);
      return;
    }

    // 关键修复：在显示下一题"之前"移除 nextLoading，避免与题目气泡并存
    removeNextLoading();

    if (nextData.current_question) {
      state.currentIndex = nextData.current_question_index;
      state.currentQuestionId = nextData.current_question.question_id;
      state.questions[state.currentIndex] = {
        index: state.currentIndex,
        question_id: nextData.current_question.question_id,
        text: nextData.current_question.question_text,
        dimension: nextData.current_question.dimension,
      };
      showQuestion(nextData.current_question, state.currentIndex);
      setProgress(state.currentIndex, state.totalQuestions);
    }

    // 恢复输入
    $('input-answer').disabled = false;
    $('btn-submit').disabled = false;
    $('btn-submit').textContent = '提交回答';
    $('input-answer').focus();
    state.submitting = false;
  } catch (e) {
    console.error('加载下一题失败:', e);
    alert('加载下一题失败: ' + e.message);
    $('input-answer').disabled = false;
    $('btn-submit').disabled = false;
    $('btn-submit').textContent = '提交回答';
    state.submitting = false;
  } finally {
    // 兜底：确保 nextLoading 被移除
    removeNextLoading();
  }
}

// ====== 显示报告生成loading并生成报告 ======
async function showReportLoadingAndGenerate() {
  const reportLoading = showLoading(
    state.evaluationMode === 'full_simulation'
      ? '全真模拟结束，AI 正在批量评估并生成报告'
      : '所有题目已答完，AI 正在生成面试报告'
  );
  let reportLoadingRemoved = false;
  const removeReportLoading = () => {
    if (!reportLoadingRemoved && reportLoading && reportLoading.msg && reportLoading.msg.parentNode) {
      reportLoading.msg.remove();
      reportLoadingRemoved = true;
    }
  };

  try {
    // 调用 next 触发完成（最后一题答完后，next 会自动 complete 并返回 summary）
    const completeData = await api('POST', `/api/mock-interview/sessions/${state.sessionId}/next`);
    // 关键修复：在展示报告"之前"移除 reportLoading
    removeReportLoading();
    await showReportFromData(completeData);
  } catch (e) {
    console.error('next 触发完成失败:', e);
    // 失败时尝试直接调用 complete
    try {
      const completeData = await api('POST', `/api/mock-interview/sessions/${state.sessionId}/complete`);
      removeReportLoading();
      await showReportFromData(completeData);
    } catch (e2) {
      console.error('complete 也失败:', e2);
      removeReportLoading();
      alert('生成报告失败: ' + e2.message);
      state.submitting = false;
    }
  } finally {
    // 兜底：确保 reportLoading 被移除
    removeReportLoading();
  }
}

// ====== 从完成数据展示报告 ======
async function showReportFromData(data) {
  // 全真模拟模式：补充评估数据
  if (state.evaluationMode === 'full_simulation' && data.evaluations && data.evaluations.length > 0) {
    state.evaluations = data.evaluations.map((ev, i) => ({
      index: i,
      score: ev.overall_score,
      dimensions: ev.dimension_scores,
      feedback: ev.ai_feedback,
      strengths: ev.strengths,
      weaknesses: ev.weaknesses,
      suggestions: ev.suggestions,
    }));
  }

  const summary = data.summary || data.summary_report;
  showReport({
    report: summary,
    average_score: data.average_score || 0,
    evaluations: state.evaluations,
  });
  state.submitting = false;
}

// ====== 展示报告 ======
function showReport(data) {
  showPhase('report');
  const avg = data.average_score || 0;
  const avg10 = (avg / 10).toFixed(1);
  const evaluations = data.evaluations || state.evaluations;
  const dimCount = evaluations.length;

  // 计算各维度平均分（从0-100转0-10）
  const dimAvg = { content: 0, logic: 0, expression: 0, depth: 0, relevance: 0 };
  evaluations.forEach(e => {
    if (e.dimensions) {
      Object.entries(e.dimensions).forEach(([k, v]) => {
        if (dimAvg[k] !== undefined) dimAvg[k] += (v / 10);
      });
    }
  });
  Object.keys(dimAvg).forEach(k => {
    dimAvg[k] = dimCount > 0 ? dimAvg[k] / dimCount : 0;
  });

  $('report-summary').innerHTML = `
    <div class="summary-stat">
      <div class="summary-stat-value">${avg10}</div>
      <div class="summary-stat-label">平均分（10分制）</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-value">${dimCount}/${state.totalQuestions}</div>
      <div class="summary-stat-label">已答题数</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-value">${Math.round((dimCount / state.totalQuestions) * 100)}%</div>
      <div class="summary-stat-label">回答率</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-value">${state.totalQuestions}</div>
      <div class="summary-stat-label">总题数</div>
    </div>`;

  renderRadarChart(dimAvg);

  // 渲染报告内容
  const reportData = data.report;
  let reportHtml = '';
  if (!reportData) {
    reportHtml = '<p>暂无报告内容</p>';
  } else if (typeof reportData === 'string') {
    reportHtml = renderMarkdown(reportData);
  } else {
    reportHtml = renderStructuredReport(reportData, evaluations);
  }
  $('report-content').innerHTML = reportHtml;
  window.scrollTo(0, 0);
}

// ====== 渲染结构化报告 ======
function renderStructuredReport(r, evaluations) {
  let html = '';
  if (r.overall_summary) {
    html += `<h2>📋 总体评价</h2><p>${escapeHtml(r.overall_summary)}</p>`;
  }
  if (r.average_score !== undefined) {
    const avg10 = (r.average_score / 10).toFixed(1);
    html += `<p><strong>平均得分：</strong>${avg10} / 10</p>`;
  }
  if (r.dimension_analysis && Object.keys(r.dimension_analysis).length > 0) {
    html += `<h2>📊 维度分析</h2><ul>`;
    for (const [dim, analysis] of Object.entries(r.dimension_analysis)) {
      html += `<li><strong>${DIM_LABELS[dim] || dim}：</strong>${escapeHtml(analysis)}</li>`;
    }
    html += `</ul>`;
  }
  if (r.strengths && r.strengths.length > 0) {
    html += `<h2>✨ 核心优势</h2><ul>`;
    r.strengths.forEach(s => html += `<li>${escapeHtml(s)}</li>`);
    html += `</ul>`;
  }
  if (r.weaknesses && r.weaknesses.length > 0) {
    html += `<h2>⚠️ 待改进项</h2><ul>`;
    r.weaknesses.forEach(w => html += `<li>${escapeHtml(w)}</li>`);
    html += `</ul>`;
  }
  if (r.improvement_suggestions && r.improvement_suggestions.length > 0) {
    html += `<h2>💡 改进建议</h2><ul>`;
    r.improvement_suggestions.forEach(s => html += `<li>${escapeHtml(s)}</li>`);
    html += `</ul>`;
  }
  // 各题详细评估
  if (evaluations && evaluations.length > 0) {
    html += `<h2>📝 各题评估详情</h2>`;
    evaluations.forEach((ev, i) => {
      const score10 = (ev.score / 10).toFixed(1);
      html += `<div style="background:var(--secondary);padding:10px 12px;border-radius:8px;margin-bottom:8px;">`;
      html += `<div style="display:flex;justify-content:space-between;margin-bottom:4px;">`;
      html += `<strong>第 ${i + 1} 题</strong>`;
      html += `<span style="color:var(--primary);font-weight:700;">${score10}/10</span>`;
      html += `</div>`;
      if (ev.feedback) html += `<div style="font-size:12px;color:var(--foreground);">${escapeHtml(ev.feedback)}</div>`;
      html += `</div>`;
    });
  }
  return html || '<p>暂无报告内容</p>';
}

// ====== 雷达图渲染（5 维度） ======
function renderRadarChart(dimAvg) {
  const svg = $('radar-chart');
  const dimensions = ['content', 'logic', 'expression', 'depth', 'relevance'];
  const labels = ['内容完整度', '逻辑结构', '表达专业度', '深度与细节', '相关性'];
  const values = dimensions.map(d => dimAvg[d] || 0);

  const cx = 160, cy = 160, maxR = 110;
  const angleStep = (Math.PI * 2) / 5;
  const startAngle = -Math.PI / 2;

  let html = '';
  // 背景多边形（4层）
  for (let layer = 1; layer <= 4; layer++) {
    const r = (maxR / 4) * layer;
    let points = '';
    for (let i = 0; i < 5; i++) {
      const angle = startAngle + i * angleStep;
      points += `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)} `;
    }
    html += `<polygon points="${points.trim()}" fill="none" stroke="#e7eaef" stroke-width="1"/>`;
  }

  // 轴线
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    html += `<line x1="${cx}" y1="${cy}" x2="${cx + maxR * Math.cos(angle)}" y2="${cy + maxR * Math.sin(angle)}" stroke="#e7eaef" stroke-width="1"/>`;
  }

  // 数据多边形
  let dataPoints = '';
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    const r = (values[i] / 10) * maxR;
    dataPoints += `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)} `;
  }
  html += `<polygon points="${dataPoints.trim()}" fill="rgba(0,101,253,0.2)" stroke="#0065fd" stroke-width="2"/>`;

  // 数据点
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    const r = (values[i] / 10) * maxR;
    html += `<circle cx="${cx + r * Math.cos(angle)}" cy="${cy + r * Math.sin(angle)}" r="4" fill="#0065fd"/>`;
  }

  // 标签
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    const labelR = maxR + 22;
    const x = cx + labelR * Math.cos(angle);
    const y = cy + labelR * Math.sin(angle);
    html += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="600" fill="#0e1115">${labels[i]}</text>`;
    html += `<text x="${x}" y="${y + 14}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0065fd" font-weight="700">${values[i].toFixed(1)}</text>`;
  }

  svg.innerHTML = html;
}

// ====== 简易 Markdown 渲染 ======
function renderMarkdown(md) {
  let html = escapeHtml(md);
  html = html.replace(/```[\s\S]*?```/g, m => {
    const code = m.replace(/```\w*\n?/g, '').replace(/```$/g, '');
    return `<pre><code>${code}</code></pre>`;
  });
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>');
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

// ===== 左侧导航栏：拖动调整宽度 + 最小化 + 跨页同步（三页统一） =====
(function initLeftSidebar() {
    var sidebar = document.getElementById('left-sidebar');
    var resizer = document.getElementById('left-sidebar-resizer');
    var toggleBtn = document.getElementById('left-sidebar-toggle');
    if (!sidebar || !resizer) return;

    var MIN_WIDTH = 200;
    var MAX_WIDTH = 600;
    var DEFAULT_WIDTH = 240;
    var MINIMIZED_WIDTH = 56;

    function applyState(width, minimized) {
        if (minimized) {
            sidebar.classList.add('minimized');
            sidebar.style.width = MINIMIZED_WIDTH + 'px';
            if (toggleBtn) { toggleBtn.textContent = '›'; toggleBtn.title = '展开导航栏'; }
        } else {
            sidebar.classList.remove('minimized');
            sidebar.style.width = (width || DEFAULT_WIDTH) + 'px';
            if (toggleBtn) { toggleBtn.textContent = '‹'; toggleBtn.title = '最小化导航栏'; }
        }
    }

    // 初始化前禁用过渡，防止页面切换时的宽度闪烁
    sidebar.classList.add('dragging');
    var savedWidth = parseInt(localStorage.getItem('left_sidebar_width')) || DEFAULT_WIDTH;
    var savedMin = localStorage.getItem('left_sidebar_minimized') === 'true';
    applyState(savedWidth, savedMin);
    requestAnimationFrame(function() { sidebar.classList.remove('dragging'); });

    if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
            var isMin = sidebar.classList.contains('minimized');
            var newMin = !isMin;
            var w = parseInt(localStorage.getItem('left_sidebar_width')) || DEFAULT_WIDTH;
            applyState(w, newMin);
            localStorage.setItem('left_sidebar_minimized', String(newMin));
        });
    }

    var isDragging = false;
    var startX = 0;
    var startWidth = 0;

    resizer.addEventListener('mousedown', function(e) {
        e.preventDefault();
        isDragging = true;
        startX = e.clientX;
        startWidth = sidebar.offsetWidth;
        sidebar.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        var delta = e.clientX - startX;
        var newWidth = startWidth + delta;
        if (newWidth < MIN_WIDTH) newWidth = MIN_WIDTH;
        if (newWidth > MAX_WIDTH) newWidth = MAX_WIDTH;
        sidebar.style.width = newWidth + 'px';
    });

    document.addEventListener('mouseup', function() {
        if (!isDragging) return;
        isDragging = false;
        sidebar.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        var finalWidth = sidebar.offsetWidth;
        if (!sidebar.classList.contains('minimized')) {
            localStorage.setItem('left_sidebar_width', String(finalWidth));
        }
    });

    window.addEventListener('storage', function(e) {
        if (e.key === 'left_sidebar_width' || e.key === 'left_sidebar_minimized') {
            var w = parseInt(localStorage.getItem('left_sidebar_width')) || DEFAULT_WIDTH;
            var m = localStorage.getItem('left_sidebar_minimized') === 'true';
            applyState(w, m);
        }
    });
})();

// ===== 右侧侧边栏：拖动调整宽度 + 收起/展开 + 偏好持久化（三页统一 key） =====
(function setupRightSidebar() {
    var resizer = document.getElementById('sidebar-resizer');
    var sidebarEl = document.getElementById('right-sidebar');
    var toggleBtn = document.getElementById('sidebar-toggle');
    var expandBtn = document.getElementById('sidebar-expand');
    if (!sidebarEl) return;

    var isResizing = false;
    var isCollapsed = localStorage.getItem('right_sidebar_collapsed') === 'true';
    var SIDEBAR_MIN_WIDTH = 200;
    var SIDEBAR_MAX_WIDTH = 600;

    function applyCollapsedState(collapsed) {
        if (collapsed) {
            sidebarEl.style.display = 'none';
            if (resizer) resizer.style.display = 'none';
            if (expandBtn) expandBtn.style.display = 'block';
            if (toggleBtn) toggleBtn.textContent = '\u00BB';
        } else {
            sidebarEl.style.display = 'flex';
            if (resizer) resizer.style.display = 'block';
            if (expandBtn) expandBtn.style.display = 'none';
            if (toggleBtn) toggleBtn.textContent = '\u00AB';
        }
        localStorage.setItem('right_sidebar_collapsed', collapsed);
    }

    if (resizer) {
        resizer.addEventListener('mousedown', function(e) {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isResizing) return;
            var newWidth = window.innerWidth - e.clientX;
            var clampedWidth = Math.max(SIDEBAR_MIN_WIDTH, Math.min(SIDEBAR_MAX_WIDTH, newWidth));
            sidebarEl.style.width = clampedWidth + 'px';
            localStorage.setItem('right_sidebar_width', clampedWidth);
        });

        document.addEventListener('mouseup', function() {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
    }

    if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
            isCollapsed = !isCollapsed;
            applyCollapsedState(isCollapsed);
        });
    }

    if (expandBtn) {
        expandBtn.addEventListener('click', function() {
            isCollapsed = false;
            applyCollapsedState(false);
        });
    }

    // 初始化时读取偏好（宽度 + 收起状态）
    var savedWidth = localStorage.getItem('right_sidebar_width');
    if (savedWidth) {
        var w = parseInt(savedWidth, 10);
        if (!isNaN(w)) sidebarEl.style.width = w + 'px';
    }
    applyCollapsedState(isCollapsed);

    // 跨标签页同步
    window.addEventListener('storage', function(e) {
        if (e.key === 'right_sidebar_width' && !isResizing) {
            var w = parseInt(e.newValue, 10);
            if (!isNaN(w)) sidebarEl.style.width = w + 'px';
        }
        if (e.key === 'right_sidebar_collapsed') {
            isCollapsed = e.newValue === 'true';
            applyCollapsedState(isCollapsed);
        }
    });
})();
