            }

            function showThinking() {
                messageCounter++;
                var id = 'msg-thinking-' + messageCounter;
                var msgDiv = document.createElement('div');
                // 任务E：附加 ai-msg 类名（thinking 指示器也走 AI 居中样式）
                msgDiv.className = 'message assistant ai-msg';
                msgDiv.id = id;
                msgDiv.innerHTML =
                    '<div class="msg-avatar"><span style="font-size:0.85rem;font-weight:600;">AI</span></div>' +
                    '<div class="msg-content"><div class="msg-stack"><div class="msg-bubble thinking-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>';
                messagesContainer.appendChild(msgDiv);
                messagesContainer.style.display = '';
                return id;
            }

            function removeThinking(id) {
                var el = document.getElementById(id);
                if (el) el.remove();
            }

            function scrollToBottom() {
                setTimeout(function () {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 50);
            }

            function getStatusIcon(status) {
                var icons = {
                    'running': '[*]',
                    'success': '[v]',
                    'error': '[x]',
                    'miss': '[-]',
                    'skip': '[-]',
                    'low_match': '[!]',
                    'not_implemented': '[!]',
                };
                return icons[status] || '[' + status + ']';
            }

            function escapeHtml(str) {
                if (!str) return '';
                var div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============================
            //  11b. Status panel helpers (检索流程面板)
            // ============================
            function getStatusStepIconHtml(status) {
                // running -> 旋转加载圈
                if (status === 'running') {
                    return '<span class="icon-spinner"></span>';
                }
                // success -> 绿色 ✓
                if (status === 'success') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
                }
                // error -> 红色 ✗
                if (status === 'error') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                }
                // miss -> 黄色 ○
                if (status === 'miss') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="7"/></svg>';
                }
                // skip -> 灰色 -
                if (status === 'skip') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="6" y1="12" x2="18" y2="12"/></svg>';
                }
                // low_match / not_implemented -> 黄色 !
                if (status === 'low_match' || status === 'not_implemented') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="7" x2="12" y2="14"/><line x1="12" y1="17.5" x2="12" y2="17.5"/></svg>';
                }
                return '';
            }

            function clearStatusPanel() {
                statusTimeline.innerHTML = '';
                statusStepMap = {};
                statusTimeline.style.display = 'none';
                statusEmpty.style.display = '';
                var footer = statusPanelContent.querySelector('.status-footer');
                if (footer) footer.remove();
            }

            function ensureStatusTimelineVisible() {
                statusEmpty.style.display = 'none';
                statusTimeline.style.display = '';
            }

            function addOrUpdateStatusStep(event) {
                ensureStatusTimelineVisible();
                var stepKey = String(event.step);
                var status = event.status || 'running';
                var name = event.name || ('步骤 ' + event.step);
                var detail = event.detail || '';

                var stepEl = statusStepMap[stepKey];
                if (!stepEl) {
                    stepEl = document.createElement('div');
                    stepEl.className = 'status-step ' + status;
                    stepEl.dataset.step = stepKey;
                    stepEl.innerHTML =
                        '<div class="status-step-icon">' + getStatusStepIconHtml(status) + '</div>' +
                        '<div class="status-step-name"></div>' +
                        '<div class="status-step-detail"></div>';
                    statusTimeline.appendChild(stepEl);
                    statusStepMap[stepKey] = stepEl;
                } else {
                    stepEl.className = 'status-step ' + status;
                }

                var iconEl = stepEl.querySelector('.status-step-icon');
                if (iconEl) iconEl.innerHTML = getStatusStepIconHtml(status);

                var nameEl = stepEl.querySelector('.status-step-name');
                if (nameEl) nameEl.textContent = name;

                var detailEl = stepEl.querySelector('.status-step-detail');
                if (detailEl) detailEl.textContent = detail;

                statusPanelContent.scrollTop = statusPanelContent.scrollHeight;
            }

            function showStatusFooter(text, kind) {
                ensureStatusTimelineVisible();
                var existing = statusPanelContent.querySelector('.status-footer');
                if (existing) existing.remove();
                var el = document.createElement('div');
                el.className = 'status-footer ' + (kind || 'complete');
                el.textContent = text;
                statusPanelContent.appendChild(el);
                statusPanelContent.scrollTop = statusPanelContent.scrollHeight;
            }

            // ============================

            window._escapeHtml = escapeHtml;
            // 暴露当前用户信息，供联系人模块判断 sender_id 归属
            window._userInfo = userInfo;

        })();

                        console.error('[WebSocket] 连接错误:', error);
                        showToast('实时消息连接失败，将使用HTTP轮询', 'warning');
                    };

                    _wsConn.onclose = function (event) {
                        console.log('[WebSocket] 连接关闭:', event.code, event.reason);
                        _setWsConnected(false);

                        // 自动重连
                        if (websocketReconnectAttempts < WEBSOCKET_MAX_RECONNECT) {
                            websocketReconnectAttempts++;
                            console.log(`[WebSocket] 尝试重连 (${websocketReconnectAttempts}/${WEBSOCKET_MAX_RECONNECT})`);
                            setTimeout(initWebSocket, WEBSOCKET_RECONNECT_DELAY);
                        } else {
                            console.warn('[WebSocket] 达到最大重连次数，降级为HTTP轮询');
                            fallbackToHTTPPolling();
                        }
                    };
                } catch (error) {
                    console.error('[WebSocket] 初始化失败:', error);
                    fallbackToHTTPPolling();
                }
            }

            function handleWebSocketMessage(message) {
                //#region debug-point IP3
                console.log('[DEBUG-IP3] WebSocket message received:', message);
                console.log('[DEBUG-IP3] message type:', message.type);
                console.log('[DEBUG-IP3] conversation_id:', message.conversation_id);
                //#endregion
                const msgType = message.type;

                if (msgType === 'pong') {
                    // 心跳响应
                    return;
                }

                if (msgType === 'new_message') {
                    // 新消息推送
                    const convId = message.conversation_id;
                    const msgData = message.message;

                    // 如果当前正在查看该对话，实时更新UI
                    if (_getConvId() === convId) {
                        appendNewMessage(msgData);
                        // 立即标记已读(因为用户正在看这个对话)
                        apiRequest('/api/unread-messages/mark-read', {
                            method: 'POST',
                            body: JSON.stringify({ conversation_id: convId }),
                        }).catch(function (e) {
                            console.warn('[未读] 标记已读失败:', e);
                        });
                    } else {
                        // 未查看的对话:增量增加未读计数
                        window.incrementUnreadCount(convId);
                    }

                    // 更新联系人列表中的最后消息
                    updateContactLastMessage(convId, msgData);

                    // 显示通知
                    if (_getConvId() !== convId) {
                        showToast(`收到来自 ${msgData.sender_id} 的新消息`, 'info');
                    }
                }

                if (msgType === 'online_status') {
                    // 在线状态更新
                    updateContactOnlineStatus(message.user_id, message.online);
                }

                if (msgType === 'typing') {
                    // 正在输入提示
                    if (_getConvId()) {
                        showTypingIndicator(message.user_id, message.display_name);
                    }
                }
            }

            function fallbackToHTTPPolling() {
                console.log('[WebSocket] 降级为HTTP轮询');
                if (_getConvId() && !_getPollTimer()) {

                }
            }

            // ============================
            //  Contact Message Functions
            // ============================
            async function loadContactMessages(conversationId) {
                const container = document.getElementById('contactChatMessages');
                if (!container) return;

                // 首次加载时显示loading，后续轮询时静默更新
                const isFirstLoad = !container.dataset.loaded || container.dataset.loaded === 'false';
                if (isFirstLoad) {
                    container.innerHTML = '<div class="loading">加载中...</div>';
                }

                try {
                    const data = await apiRequest(`/api/contact-chat/${conversationId}/messages`);
                    const messages = data.messages || [];
                    if (messages.length === 0) {
                        if (isFirstLoad) {
                            container.innerHTML = '<div class="chat-empty">暂无消息，开始对话吧</div>';
                        }
                        return;
                    }
                    // 使用统一渲染函数：按 sender_id 区分自己/对方/AI
                    const currentUserId = (userInfo && (userInfo.user_id || userInfo.id)) ? (userInfo.user_id || userInfo.id) : null;

                    if (isFirstLoad) {
                        // 首次加载：直接渲染所有消息
                        container.innerHTML = '';
                        messages.forEach(msg => {
                            const html = renderContactMessage(msg, currentUserId);
                            const tempDiv = document.createElement('div');
                            tempDiv.innerHTML = html;
                            const msgElement = tempDiv.firstElementChild;
                            msgElement.dataset.msgId = msg.id || `${msg.sender_id}_${msg.created_at}`;
                            container.appendChild(msgElement);
                        });
                        container.dataset.loaded = 'true';
                    } else {
                        // 后续轮询：增量更新（只添加新消息）
                        updateMessagesIncrementally(container, messages, currentUserId);
                    }

                    container.scrollTop = container.scrollHeight;
                } catch (e) {
                    if (isFirstLoad) {
                        container.innerHTML = '<div class="chat-error">加载失败</div>';
                    }
                    console.error('[Chat] 加载消息失败:', e);
                }
            }

            /**
             * 增量更新消息列表（避免全量重渲染和闪烁）
             */
            function updateMessagesIncrementally(container, newMessages, currentUserId) {
                // 获取当前显示的消息ID集合
                const existingMessageIds = new Set();
                container.querySelectorAll('.message[data-msg-id]').forEach(el => {
                    existingMessageIds.add(el.dataset.msgId);
                });

                // 只添加新消息（通过消息ID判断）
                let hasNewMessages = false;
                newMessages.forEach(msg => {
                    const msgId = msg.id || `${msg.sender_id}_${msg.created_at}`;
                    if (!existingMessageIds.has(msgId)) {
                        // 插入新消息
                        const html = renderContactMessage(msg, currentUserId);
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = html;
                        const newMsgElement = tempDiv.firstElementChild;
                        newMsgElement.dataset.msgId = msgId;

                        // 找到合适的插入位置（按时间排序插入到最后）
                        container.appendChild(newMsgElement);
                        hasNewMessages = true;
                    }
                });

                // 只有在添加了新消息时才滚动
                if (hasNewMessages) {
                    container.scrollTop = container.scrollHeight;
                }
            }

            /**
             * 渲染单条联系人消息为 HTML 字符串（统一左右布局 + 头像）
             * - 任务B：当前用户（sender_id == currentUserId）→ 居右（.sent）
             * - 任务B：对方 → 居左（.received）
             * - 任务B-2：AI 消息（sender_id 为 null 且 role==='assistant'）→ 居中（.ai-msg）
             * 兼容字段：若后端未回传 sender_id，则回退到 sender_type 判断
             */
            function renderContactMessage(msg, currentUserId) {
                // 安全解析时间
                let timeText = '';
                try {
                    timeText = new Date(msg.created_at).toLocaleTimeString();
                } catch (e) {
                    timeText = '';
                }

                // 1) 优先用 sender_id 判断
                let isMine = false;
                if (msg.sender_id && currentUserId) {
                    isMine = String(msg.sender_id) === String(currentUserId);
                } else if (msg.sender_type) {
                    // 2) 回退：用 sender_type（兼容历史数据）
                    const myType = (userInfo && userInfo.role === 'consultant') ? 'consultant' : 'user';
                    isMine = msg.sender_type === myType;
                }

                // 3) AI 消息判断
                const isAI = !msg.sender_id && msg.role === 'assistant';

                // 4) 决定样式类
                let cls = 'message';
                if (isAI) {
                    cls += ' ai-msg';
                } else if (isMine) {
                    cls += ' sent';
                } else {
                    cls += ' received';
                }

                // 5) 头像首字母
                const myName = (userInfo && (userInfo.display_name || userInfo.username)) || '我';
                const myInitial = (myName || '我')[0] || '我';
                const otherNameEl = document.getElementById('contactChatName');
                const otherName = otherNameEl ? (otherNameEl.textContent || 'TA') : 'TA';
                const otherInitial = (otherName || 'TA')[0] || 'T';
                const aiInitial = 'AI';

                let avatarChar = myInitial;
                let senderLabel = '';
                if (isAI) {
                    avatarChar = aiInitial;
                    senderLabel = '<span class="sender-label"><span class="ai-tag">AI 助手</span></span>';
                } else if (isMine) {
                    avatarChar = myInitial;
                } else {
                    avatarChar = otherInitial;
                    senderLabel = `<span class="sender-label">${escapeHtml(otherName)}</span>`;
                }

                const safeContent = escapeHtml(msg.content || '').replace(/\n/g, '<br>');
                return `<div class="${cls}">
                    <div class="msg-row">
                        <div class="msg-avatar-circle">${escapeHtml(avatarChar)}</div>
                        <div class="msg-stack">
                            ${senderLabel}
                            <div class="msg-bubble">${safeContent}</div>
                            <div class="msg-time">${timeText}</div>
                        </div>
                    </div>
                </div>`;
            }

            function appendNewMessage(msgData) {
                const container = document.getElementById('contactChatMessages');
                if (!container) return;

                const currentUserId = (userInfo && (userInfo.user_id || userInfo.id)) ? (userInfo.user_id || userInfo.id) : null;
                const html = renderContactMessage(msgData, currentUserId);
                container.insertAdjacentHTML('beforeend', html);
                container.scrollTop = container.scrollHeight;
            }

             * @param {string} conversationId - 对话ID

            window.incrementUnreadCount = function (conversationId) {
                var contacts = document.querySelectorAll('.contact-item');
                contacts.forEach(function (item) {
                    var onclickAttr = item.getAttribute('onclick');
                    if (onclickAttr && onclickAttr.includes(conversationId)) {
                        var badgeEl = item.querySelector('.unread-badge');
                        if (!badgeEl) {
                            console.warn('[未读] 找不到徽章元素: conv=' + conversationId);
                            return;
                        }

                        // 优先从data-unread属性读取真实未读数
                        var dataCount = parseInt(badgeEl.dataset.unread) || 0;
                        var newCount = dataCount + 1;

                        // 更新徽章显示
                        badgeEl.textContent = newCount > 99 ? '99+' : newCount;
                        badgeEl.dataset.unread = newCount;
                        item.classList.add('has-unread');

                        // 更新data属性,供后续使用
                        item.dataset.unreadCount = newCount;

                        console.log('[未读] 增加未读计数: conv=' + conversationId + ', count=' + newCount);

                        var roleLabel = u.role === 'consultant' ? '企业' : '用户';
                        // Escape quotes in name for onclick
                        var safeName = name.replace(/'/g, "\\'");
                        return '<div class="user-search-item">' +
                            '<div><span class="user-name">' + name + '</span><span class="user-role-badge ' + u.role + '">' + roleLabel + '</span></div>' +
                            '<button class="u-action-btn" onclick="consultantStartChat(\'' + u.id + '\', \'' + safeName + '\')">开始对话</button>' +
                        '</div>';
                    }).join('');
                } catch (e) {
                    resultsDiv.innerHTML = '<div style="text-align:center;padding:30px;color:#9ca3af;">搜索失败</div>';
                }
            };

            // ============================
            //  Start Chat with User
            // ============================
            window.consultantStartChat = async function (targetUserId, targetName) {
                try {
                    var data = await apiRequest('/api/contact-chat/ensure', {
                        method: 'POST',
                        body: JSON.stringify({ target_user_id: targetUserId }),
                    });
                    showToast('已与 ' + targetName + ' 建立对话');
                    closeContactSearch();
                    consultantLoadContacts();
                    // 使用新的切换函数
                    switchToContactChat(data.conversation.id, targetName);
                } catch (e) {
                    showToast('创建对话失败: ' + e.message);
                }
            };

            // ============================
            //  Open Contact Chat (已改用switchToContactChat)
            // ============================
            window.consultantOpenChat = function (conversationId, contactName) {
                // 直接使用新的切换函数
                switchToContactChat(conversationId, contactName);
            };

            // ============================
            //  Toast
            // ============================
            function showToast(message) {
                var existing = document.querySelector('.contact-toast');
                if (existing) existing.remove();

                var toast = document.createElement('div');
                toast.className = 'contact-toast';
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(function () {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(function () { toast.remove(); }, 300);
                }, 2500);
            }

            // ============================
            //  Init Contacts
            // ============================
            function initContacts() {
                if (typeof consultantLoadContacts === 'function') {
                    consultantLoadContacts();
                }
                // 每30秒刷新联系人列表
                setInterval(consultantLoadContacts, 30000);
            }

            // 延迟初始化联系人，确保主页面完全加载后再加载联系人模块
            // 解决因认证依赖未就绪导致的闪退问题
            var _contactInitTimer = setTimeout(function initContactsDelayed() {
                try {
                    if (typeof consultantLoadContacts === 'function') {
                        consultantLoadContacts();
                    }
                    // 每30秒刷新联系人列表
                    setInterval(consultantLoadContacts, 30000);
                } catch (e) {
                    console.warn('[Contacts] 初始化延迟加载失败，3秒后重试:', e.message);
                    setTimeout(function () {
                        try {
                            if (typeof consultantLoadContacts === 'function') {
                                consultantLoadContacts();
                            }
                            setInterval(consultantLoadContacts, 30000);
                        } catch (e2) {
                            console.error('[Contacts] 初始化最终失败:', e2.message);
                        }
                    }, 3000);
                }
            }, 800);

            if (document.readyState === 'complete') {
                // 覆盖上面的定时器，延迟到更安全的时机
                clearTimeout(_contactInitTimer);
                setTimeout(initContacts, 800);
            } else {
                window.addEventListener('load', function () {
                    clearTimeout(_contactInitTimer);
                    setTimeout(initContacts, 800);
                });
            }

            // 暴露 showToast 到 window，以便 HTML 内联 onclick 处理器可以调用
            // （IIFE 内的函数默认在 window 上不可见）
            window.showToast = showToast;
            window.loadContactMessages = loadContactMessages;
            window.startContactPolling = startContactPolling;
            window.appendNewMessage = appendNewMessage;
            window.updateContactLastMessage = updateContactLastMessage;

        })();
    </script>

    <!-- P0 核心功能模块(企业端) -->
    <link rel="stylesheet" href="/static/p0-styles.css" />
    <script src="/static/p0-modules.js"></script>
    <script>
        window.ROLE = 'consultant';
        document.addEventListener('DOMContentLoaded', function() {
            if (window.P0Modules && window.P0Modules.PhoneBindingDialog) {
                setTimeout(() => {
                    window.P0Modules.PhoneBindingDialog.autoCheck();
                }, 2000);
            }
        });
    </script>
</body>
