<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - RAG 智能检索系统</title>
    <style>
        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: #1f2937;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f4f8;
        }

        /* ===== Main Container ===== */
        .login-container {
            display: flex;
            width: 960px;
            max-width: 94vw;
            min-height: 600px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12), 0 4px 16px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            animation: containerIn 0.5s ease-out;
        }

        @keyframes containerIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== Left Panel: Brand ===== */
        .brand-panel {
            flex: 0 0 440px;
            background: linear-gradient(135deg, #1a237e 0%, #283593 25%, #3949ab 50%, #5c6bc0 75%, #7986cb 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 40px;
            color: #ffffff;
            overflow: hidden;
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.06) 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(5%, 5%);
            }
        }

        /* Decorative circles */
        .brand-panel .deco-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }
        .brand-panel .deco-circle:nth-child(1) {
            width: 320px;
            height: 320px;
            top: -80px;
            right: -80px;
        }
        .brand-panel .deco-circle:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: 60px;
            left: -60px;
            border-width: 3px;
        }
        .brand-panel .deco-circle:nth-child(3) {
            width: 120px;
            height: 120px;
            bottom: 160px;
            right: 40px;
            background: rgba(255, 255, 255, 0.04);
            border: none;
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 28px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .brand-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .brand-subtitle {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.85;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
            max-width: 300px;
            margin: 0 auto;
        }

        .brand-feature-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(4px);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .brand-feature-item:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateX(4px);
        }

        .brand-feature-item .f-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .brand-feature-item .f-text {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }

        .brand-feature-item .f-text small {
            display: block;
            font-weight: 400;
            opacity: 0.7;
            font-size: 12px;
            margin-top: 2px;
        }

        /* ===== Right Panel: Form ===== */
        .form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 56px;
            background: #ffffff;
            min-width: 0;
        }

        .form-header {
            margin-bottom: 32px;
        }

        .form-header h2 {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
        }

        .form-header p {
            font-size: 14px;
            color: #6b7280;
        }

        /* ===== Tab Switcher ===== */
        .tab-switcher {
            display: flex;
            gap: 0;
            margin-bottom: 32px;
            background: #f3f4f6;
            border-radius: 12px;
            padding: 4px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            z-index: 1;
            outline: none;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: #374151;
        }

        .tab-btn.active {
            color: #ffffff;
            background: linear-gradient(135deg, #3949ab, #5c6bc0);
            box-shadow: 0 2px 8px rgba(57, 73, 171, 0.30);
        }

        /* ===== Forms ===== */
        .auth-form {
            display: none;
            animation: formIn 0.35s ease;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes formIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: #ef4444;
            margin-left: 2px;
        }

        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border: 1.5px solid #d1d5db;
            border-radius: 12px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #f9fafb;
        }

        .form-group .input-wrapper:focus-within {
            border-color: #3949ab;
            box-shadow: 0 0 0 3px rgba(57, 73, 171, 0.12);
            background: #ffffff;
        }

        .form-group .input-wrapper.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.10);
        }

        .form-group .input-wrapper .input-icon {
            flex-shrink: 0;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #9ca3af;
            transition: color 0.2s ease;
        }

        .form-group .input-wrapper:focus-within .input-icon {
            color: #3949ab;
        }

        .form-group .input-wrapper input {
            flex: 1;
            padding: 12px 12px 12px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            color: #1f2937;
            outline: none;
            font-family: inherit;
            min-width: 0;
        }

        .form-group .input-wrapper input::placeholder {
            color: #9ca3af;
        }

        .form-group .input-wrapper .toggle-pwd {
            flex-shrink: 0;
            width: 40px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            color: #9ca3af;
            padding: 4px;
            display: none;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .form-group .input-wrapper .toggle-pwd:hover {
            color: #374151;
        }

        .form-group .input-wrapper .toggle-pwd.visible {
            display: flex;
        }

        .field-error {
            font-size: 12px;
            color: #ef4444;
            margin-top: 4px;
            padding-left: 2px;
            min-height: 18px;
            transition: opacity 0.2s ease;
        }

        /* ===== Submit Button ===== */
        .submit-btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3949ab, #5c6bc0);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(57, 73, 171, 0.35);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .submit-btn .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ===== Loading Spinner ===== */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .submit-btn.loading .spinner {
            display: inline-block;
        }
        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== Global Error/Toast ===== */
        .form-toast {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: toastIn 0.3s ease;
        }

        .form-toast.show {
            display: flex;
        }

        .form-toast.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .form-toast.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .form-toast .toast-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 820px) {
            .login-container {
                flex-direction: column;
                width: 100%;
                max-width: 460px;
                min-height: auto;
                border-radius: 16px;
                margin: 16px;
            }

            .brand-panel {
                flex: none;
                padding: 32px 28px 24px;
            }

            .brand-panel::before {
                top: -30%;
                left: -30%;
                width: 160%;
                height: 160%;
            }

            .brand-icon {
                width: 60px;
                height: 60px;
                font-size: 28px;
                margin-bottom: 16px;
            }

            .brand-title {
                font-size: 22px;
            }

            .brand-subtitle {
                font-size: 14px;
                margin-bottom: 24px;
            }

            .brand-features {
                display: none;
            }

            .form-panel {
                padding: 32px 28px;
            }

            .form-header h2 {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 0;
                border-radius: 0;
                max-width: 100%;
                min-height: 100vh;
            }

            .brand-panel {
                padding: 24px 20px;
            }

            .brand-title {
                font-size: 20px;
            }

            .brand-subtitle {
                font-size: 13px;
                margin-bottom: 16px;
            }

            .form-panel {
                padding: 24px 20px;
            }

            .tab-btn {
                font-size: 14px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">

        <!-- ===== Left: Brand Panel ===== -->
        <div class="brand-panel">
            <div class="deco-circle"></div>
            <div class="deco-circle"></div>
            <div class="deco-circle"></div>
            <div class="brand-content">
                <div class="brand-icon">🌍</div>
                <div class="brand-title">留学通</div>
                <div class="brand-subtitle">RAG 智能检索系统</div>
                <div class="brand-features">
                    <div class="brand-feature-item">
                        <div class="f-icon">📚</div>
                        <div class="f-text">
                            智能知识检索
                            <small>多级检索策略，精准匹配留学资讯</small>
                        </div>
                    </div>
                    <div class="brand-feature-item">
                        <div class="f-icon">⚡</div>
                        <div class="f-text">
                            实时答疑
                            <small>流式输出，即刻获取深度解答</small>
                        </div>
                    </div>
                    <div class="brand-feature-item">
                        <div class="f-icon">🔒</div>
                        <div class="f-text">
                            安全可靠
                            <small>数据加密传输，隐私全面保护</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== Right: Form Panel ===== -->
        <div class="form-panel">
            <div class="form-header">
                <h2 id="formTitle">欢迎回来</h2>
                <p id="formDesc">登录您的账号，继续使用留学通服务</p>
            </div>

            <!-- Tab Switcher -->
            <div class="tab-switcher" role="tablist">
                <button class="tab-btn active" data-tab="login" role="tab" aria-selected="true">登录</button>
                <button class="tab-btn" data-tab="register" role="tab" aria-selected="false">注册</button>
            </div>

            <!-- Global Toast -->
            <div class="form-toast" id="formToast">
                <span class="toast-icon"></span>
                <span class="toast-message"></span>
            </div>

            <!-- ===== Login Form ===== -->
            <form class="auth-form active" id="loginForm" autocomplete="off" novalidate>
                <div class="form-group">
                    <label>用户名 <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="loginUsername" placeholder="请输入用户名" maxlength="50" autocomplete="username">
                    </div>
                    <div class="field-error" id="loginUsernameError"></div>
                </div>

                <div class="form-group">
                    <label>密码 <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                        <button type="button" class="toggle-pwd" aria-label="切换密码可见性">👁</button>
                    </div>
                    <div class="field-error" id="loginPasswordError"></div>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                    <span class="btn-content">
                        <span class="spinner"></span>
                        <span class="btn-text">登 录</span>
                    </span>
                </button>
            </form>

            <!-- ===== Register Form ===== -->
            <form class="auth-form" id="registerForm" autocomplete="off" novalidate>
                <div class="form-group">
                    <label>用户名 <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="regUsername" placeholder="字母、数字和下划线，2-50位" maxlength="50" autocomplete="off">
                    </div>
                    <div class="field-error" id="regUsernameError"></div>
                </div>

                <div class="form-group">
                    <label>邮箱 <span class="optional-tag" style="color:#9ca3af;font-weight:400;font-size:12px;">（可选）</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="regEmail" placeholder="请输入邮箱地址（选填）" autocomplete="email">
                    </div>
                    <div class="field-error" id="regEmailError"></div>
                </div>

                <div class="form-group">
                    <label>密码 <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPassword" placeholder="至少 6 位密码" autocomplete="new-password">
                        <button type="button" class="toggle-pwd" aria-label="切换密码可见性">👁</button>
                    </div>
                    <div class="field-error" id="regPasswordError"></div>
                </div>

                <div class="form-group">
                    <label>确认密码 <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="password" id="regConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
                        <button type="button" class="toggle-pwd" aria-label="切换密码可见性">👁</button>
                    </div>
                    <div class="field-error" id="regConfirmPasswordError"></div>
                </div>

                <button type="submit" class="submit-btn" id="registerBtn">
                    <span class="btn-content">
                        <span class="spinner"></span>
                        <span class="btn-text">注 册</span>
                    </span>
                </button>
            </form>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            // ============================
            //  1. 页面加载时检查已有 Token
            // ============================
            const existingToken = localStorage.getItem('rag-auth-token');
            if (existingToken) {
                window.location.replace('/');
                return;
            }

            // ============================
            //  2. DOM 引用
            // ============================
            const API_BASE = window.location.origin;

            const tabBtns = document.querySelectorAll('.tab-btn');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const formToast = document.getElementById('formToast');
            const toastIcon = formToast.querySelector('.toast-icon');
            const toastMsg = formToast.querySelector('.toast-message');

            // Login fields
            const loginUsername = document.getElementById('loginUsername');
            const loginPassword = document.getElementById('loginPassword');
            const loginUsernameErr = document.getElementById('loginUsernameError');
            const loginPasswordErr = document.getElementById('loginPasswordError');
            const loginBtn = document.getElementById('loginBtn');

            // Register fields
            const regUsername = document.getElementById('regUsername');
            const regEmail = document.getElementById('regEmail');
            const regPassword = document.getElementById('regPassword');
            const regConfirmPassword = document.getElementById('regConfirmPassword');
            const regUsernameErr = document.getElementById('regUsernameError');
            const regEmailErr = document.getElementById('regEmailError');
            const regPasswordErr = document.getElementById('regPasswordError');
            const regConfirmPasswordErr = document.getElementById('regConfirmPasswordError');
            const registerBtn = document.getElementById('registerBtn');

            const formTitle = document.getElementById('formTitle');
            const formDesc = document.getElementById('formDesc');

            // ============================
            //  3. 密码可见性切换
            // ============================
            document.querySelectorAll('.toggle-pwd').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var input = this.parentNode.querySelector('input');
                    if (!input) return;
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.textContent = '🙈';
                    } else {
                        input.type = 'password';
                        this.textContent = '👁';
                    }
                });

                // Show the toggle button when there's input
                var parent = btn.parentNode;
                var input = parent.querySelector('input');
                if (input) {
                    input.addEventListener('input', function () {
                        btn.classList.toggle('visible', this.value.length > 0);
                    });
                }
            });

            // ============================
            //  4. Tab 切换
            // ============================
            function switchTab(tabId) {
                // Update tabs
                tabBtns.forEach(function (btn) {
                    var isActive = btn.dataset.tab === tabId;
                    btn.classList.toggle('active', isActive);
                    btn.setAttribute('aria-selected', isActive);
                });

                // Toggle forms
                loginForm.classList.toggle('active', tabId === 'login');
                registerForm.classList.toggle('active', tabId === 'register');

                // Update heading
                if (tabId === 'login') {
                    formTitle.textContent = '欢迎回来';
                    formDesc.textContent = '登录您的账号，继续使用留学通服务';
                } else {
                    formTitle.textContent = '创建账号';
                    formDesc.textContent = '注册新账号，开启智能检索之旅';
                }

                // Clear errors & toast
                clearAllErrors();
                hideToast();
            }

            tabBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    switchTab(this.dataset.tab);
                });
            });

            // ============================
            //  5. Toast 提示
            // ============================
            function showToast(message, type) {
                type = type || 'error';
                formToast.className = 'form-toast show ' + type;
                var iconMap = { error: '❌', success: '✅' };
                toastIcon.textContent = iconMap[type] || 'ℹ️';
                toastMsg.textContent = message;
            }

            function hideToast() {
                formToast.className = 'form-toast';
                formToast.classList.remove('show');
            }

            // ============================
            //  6. 表单验证
            // ============================
            function clearFieldError(errEl) {
                errEl.textContent = '';
                var wrapper = errEl.parentNode.querySelector('.input-wrapper');
                if (wrapper) wrapper.classList.remove('error');
            }

            function setFieldError(errEl, message) {
                errEl.textContent = message;
                var wrapper = errEl.parentNode.querySelector('.input-wrapper');
                if (wrapper) wrapper.classList.add('error');
            }

            function clearAllErrors() {
                document.querySelectorAll('.field-error').forEach(function (el) {
                    el.textContent = '';
                });
                document.querySelectorAll('.input-wrapper').forEach(function (el) {
                    el.classList.remove('error');
                });
            }

            // Real-time clear errors on input
            document.querySelectorAll('.auth-form input').forEach(function (input) {
                input.addEventListener('input', function () {
                    var formGroup = this.closest('.form-group');
                    if (!formGroup) return;
                    var errEl = formGroup.querySelector('.field-error');
                    if (errEl) {
                        errEl.textContent = '';
                        var wrapper = formGroup.querySelector('.input-wrapper');
                        if (wrapper) wrapper.classList.remove('error');
                    }
                    hideToast();
                });
            });

            function validateUsername(value) {
                if (!value || !value.trim()) {
                    return '用户名不能为空';
                }
                if (!/^[a-zA-Z0-9_]{2,50}$/.test(value.trim())) {
                    return '用户名只能包含字母、数字和下划线（2-50位）';
                }
                return '';
            }

            function validatePassword(value) {
                if (!value) {
                    return '密码不能为空';
                }
                if (value.length < 6) {
                    return '密码长度至少 6 位';
                }
                return '';
            }

            function validateEmail(value) {
                if (!value || !value.trim()) {
                    return ''; // optional
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim())) {
                    return '邮箱格式不正确';
                }
                return '';
            }

            function validateLoginForm() {
                var valid = true;

                var uErr = validateUsername(loginUsername.value);
                if (uErr) {
                    setFieldError(loginUsernameErr, uErr);
                    valid = false;
                }

                var pErr = validatePassword(loginPassword.value);
                if (pErr) {
                    setFieldError(loginPasswordErr, pErr);
                    valid = false;
                }

                return valid;
            }

            function validateRegisterForm() {
                var valid = true;

                var uErr = validateUsername(regUsername.value);
                if (uErr) {
                    setFieldError(regUsernameErr, uErr);
                    valid = false;
                }

                var eErr = validateEmail(regEmail.value);
                if (eErr) {
                    setFieldError(regEmailErr, eErr);
                    valid = false;
                }

                var pErr = validatePassword(regPassword.value);
                if (pErr) {
                    setFieldError(regPasswordErr, pErr);
                    valid = false;
                }

                var confirmVal = regConfirmPassword.value;
                if (!confirmVal) {
                    setFieldError(regConfirmPasswordErr, '请确认密码');
                    valid = false;
                } else if (confirmVal !== regPassword.value) {
                    setFieldError(regConfirmPasswordErr, '两次输入的密码不一致');
                    valid = false;
                }

                return valid;
            }

            // ============================
            //  7. API 调用
            // ============================
            function setLoading(btn, loading) {
                if (loading) {
                    btn.classList.add('loading');
                    btn.disabled = true;
                } else {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            }

            async function apiPost(path, body) {
                var resp = await fetch(API_BASE + path, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                var data = await resp.json();
                if (!resp.ok) {
                    var detail = (data && data.detail) || '请求失败';
                    throw new Error(detail);
                }
                return data;
            }

            function handleAuthSuccess(data) {
                // Save token
                localStorage.setItem('rag-auth-token', data.access_token);
                // Save user info
                localStorage.setItem('rag-auth-user', JSON.stringify(data.user || {}));
                // Redirect to home
                window.location.replace('/');
            }

            // ============================
            //  8. 登录提交
            // ============================
            loginForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                hideToast();

                if (!validateLoginForm()) return;

                setLoading(loginBtn, true);

                try {
                    var data = await apiPost('/api/auth/login', {
                        username: loginUsername.value.trim(),
                        password: loginPassword.value
                    });
                    handleAuthSuccess(data);
                } catch (err) {
                    showToast(err.message || '登录失败，请重试', 'error');
                } finally {
                    setLoading(loginBtn, false);
                }
            });

            // ============================
            //  9. 注册提交
            // ============================
            registerForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                hideToast();

                if (!validateRegisterForm()) return;

                setLoading(registerBtn, true);

                try {
                    var body = {
                        username: regUsername.value.trim(),
                        password: regPassword.value
                    };
                    var emailVal = regEmail.value.trim();
                    if (emailVal) {
                        body.email = emailVal;
                    }

                    var data = await apiPost('/api/auth/register', body);
                    handleAuthSuccess(data);
                } catch (err) {
                    showToast(err.message || '注册失败，请重试', 'error');
                } finally {
                    setLoading(registerBtn, false);
                }
            });

            // ============================
            //  10. Enter 键提交（由表单原生支持）
            // ============================

            // ============================
            //  11. 焦点自动进入第一个输入框
            // ============================
            loginUsername.focus();
        })();
    </script>
</body>
</html>
